<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>어울림스튜디오 메모장</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', -apple-system, sans-serif; overflow: hidden; background: #f0f2f5; }

    /* ── 프로필 화면 ── */
    #login-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; background: #f0f2f5;
    }
    .profile-title { color: #1a1a2e; font-size: 30px; font-weight: 600; margin-bottom: 12px; }
    .profile-sub { color: #888; font-size: 14px; margin-bottom: 48px; }
    .profile-list { display: flex; gap: 28px; flex-wrap: wrap; justify-content: center; }
    .profile-card {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      cursor: pointer; padding: 24px; border-radius: 16px;
      background: white; border: 2px solid #eee;
      transition: all 0.15s; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .profile-card:hover { border-color: #667eea; transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
    .profile-avatar {
      width: 100px; height: 100px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 44px; user-select: none;
    }
    .profile-name { color: #333; font-size: 15px; font-weight: 600; }

    /* ── 앱 ── */
    #app { display: none; flex-direction: column; height: 100vh; }

    /* ── 헤더 ── */
    header {
      height: 52px; background: white; border-bottom: 1px solid #e8e8e8;
      display: flex; align-items: center; padding: 0 16px; gap: 8px;
      flex-shrink: 0; z-index: 200; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .logo { font-size: 20px; }
    .app-title { color: #1a1a2e; font-size: 15px; font-weight: 700; margin-right: 4px; }
    .sync-pill {
      display: flex; align-items: center; gap: 5px; font-size: 11px;
      padding: 3px 9px; border-radius: 20px; transition: all 0.3s;
    }
    .sync-pill.synced { color: #27ae60; background: #eafaf1; }
    .sync-pill.syncing { color: #e67e22; background: #fff4e6; }
    .sync-pill.error   { color: #e74c3c; background: #fdf2f2; }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .sync-pill.synced .sync-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .sep { flex: 1; }
    .tool-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 12px; border-radius: 8px; border: 1px solid #e0e0e0;
      background: white; color: #555; font-size: 13px; cursor: pointer;
      transition: all 0.15s; white-space: nowrap;
    }
    .tool-btn:hover { background: #f5f5f5; border-color: #ccc; color: #222; }
    .tool-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .tool-btn.active { background: #fff8e1; border-color: #f39c12; color: #b7700a; font-weight: 700; }
    .user-pill { padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; color: white; }
    .logout-btn {
      background: none; border: 1px solid #e0e0e0; padding: 5px 12px;
      border-radius: 8px; font-size: 12px; color: #aaa; cursor: pointer;
    }
    .logout-btn:hover { border-color: #bbb; color: #666; }

    /* ── 캔버스 ── */
    #viewport {
      flex: 1; position: relative; overflow: hidden;
      background-color: #f0f2f5;
      background-image: radial-gradient(circle, #c8ccd4 1px, transparent 1px);
      background-size: 28px 28px;
      cursor: default;
    }
    #viewport.space-mode { cursor: grab !important; }
    #viewport.space-mode.panning { cursor: grabbing !important; }
    #canvas { position: absolute; top: 0; left: 0; width: 0; height: 0; transform-origin: 0 0; }

    /* ── 드래그 선택 박스 ── */
    #sel-box {
      position: absolute; display: none; pointer-events: none; z-index: 50;
      border: 1.5px solid #667eea;
      background: rgba(99,102,241,0.08);
      border-radius: 2px;
    }

    /* ── 요소 공통 ── */
    .el {
      position: absolute; border-radius: 8px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.12);
      display: flex; flex-direction: column;
      transition: box-shadow 0.15s;
    }
    .el:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.18); }
    .el.selected { outline: 3px solid #667eea; outline-offset: 2px; }
    /* 중요 표시 — 굵은 주황 테두리 */
    .el.important-flag {
      box-shadow: 0 2px 16px rgba(0,0,0,0.12), 0 0 0 4px #f39c12;
      transition: box-shadow 0.2s, transform 0.2s, filter 0.2s;
    }
    .el.important-flag:hover {
      transform: scale(1.015);
      box-shadow: 0 6px 28px rgba(243,156,18,0.35), 0 0 0 5px #f39c12, 0 0 18px rgba(243,156,18,0.4);
      filter: brightness(1.03);
      z-index: 20;
    }
    .el.important-flag.selected { outline: 3px solid #667eea; outline-offset: 5px; box-shadow: 0 2px 16px rgba(0,0,0,0.12), 0 0 0 5px #f39c12; }

    .el-header {
      height: 34px; display: flex; align-items: center; padding: 0 8px;
      border-radius: 8px 8px 0 0; cursor: grab; flex-shrink: 0; gap: 6px;
      user-select: none;
    }
    .el-header:active { cursor: grabbing; }
    .el-author-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.95); flex: 1; user-select: none; }

    /* 중요 버튼 */
    .star-btn {
      width: 30px; height: 30px; border-radius: 7px; border: none;
      background: rgba(255,255,255,0.2); color: rgba(255,255,255,0.65);
      font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; flex-shrink: 0; line-height: 1;
    }
    .star-btn:hover { background: rgba(255,255,255,0.35); color: white; transform: scale(1.15); }
    .star-btn.starred { color: #ffd700; background: rgba(255,215,0,0.3); filter: drop-shadow(0 0 4px rgba(255,215,0,0.8)); }

    /* 중요 배지 */
    .important-badge {
      position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
      width: 44px; height: 44px; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ffd54f, #f39c12);
      color: white; font-size: 26px;
      display: none; align-items: center; justify-content: center;
      box-shadow: 0 3px 14px rgba(243,156,18,0.75); z-index: 5;
      border: 3px solid white;
    }
    .el.important-flag .important-badge { display: flex; }

    /* ── 별 팡팡 파티클 ── */
    .star-particle {
      position: fixed; pointer-events: none; z-index: 9999;
      font-size: 18px; animation: starBurst 0.7s ease-out forwards;
    }
    @keyframes starBurst {
      0%   { opacity: 1; transform: translate(0,0) scale(1) rotate(0deg); }
      100% { opacity: 0; transform: var(--tx) scale(0.3) rotate(var(--rot)); }
    }

    /* ── 날짜 푸터 ── */
    .el-footer {
      padding: 3px 10px 5px; text-align: right;
      font-size: 10px; font-weight: 600; flex-shrink: 0;
      border-radius: 0 0 8px 8px; line-height: 1.4;
      user-select: none;
    }

    /* ── 스티커 노트 ── */
    .el-body { flex: 1; border-radius: 0; padding: 10px; min-height: 0; user-select: none; }
    .el-text {
      width: 100%; height: 100%; border: none; outline: none; resize: none;
      font-size: 13px; line-height: 1.75; background: transparent;
      color: #111; font-weight: 600; font-family: inherit; pointer-events: none; cursor: default;
      user-select: none;
    }
    .el-text.editing { pointer-events: auto; cursor: text; user-select: text; }

    /* ── 이미지 ── */
    .el-img-body { flex: 1; border-radius: 0 0 8px 8px; overflow: hidden; background: #f8f8f8; }
    .el-img-body img { width: 100%; height: 100%; object-fit: contain; display: block; pointer-events: none; }

    /* ── 리사이즈 핸들 ── */
    /* resize cursor는 JS로 동적 처리 */

    /* ── 힌트 ── */
    .canvas-hint {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: #bbb; font-size: 12px; pointer-events: none;
      background: rgba(0,0,0,0.05); padding: 6px 16px; border-radius: 20px;
      white-space: nowrap;
    }

    #file-input { display: none; }

    /* ── 농구골대 ── */
    #trash-bin {
      position: fixed; right: 60px; top: 50%; transform: translateY(-50%);
      width: 80px; height: 110px;
      display: none; flex-direction: column; align-items: center; justify-content: flex-start;
      z-index: 1000; background: transparent; border: none; box-shadow: none;
      cursor: default; user-select: none; padding-top: 4px;
      transition: filter 0.15s, transform 0.15s;
    }
    #trash-bin.visible { display: flex; }
    #trash-bin.over { transform: translateY(-50%) scale(1.12); filter: drop-shadow(0 0 12px #ff6d00cc); }
    /* 백보드 */
    #hoop-board {
      width: 54px; height: 36px;
      background: #fff; border: 3px solid #e65100;
      border-radius: 4px; position: relative;
      box-shadow: 0 2px 6px rgba(0,0,0,0.15);
      transition: background 0.15s;
    }
    #trash-bin.over #hoop-board { background: #fff3e0; }
    /* 백보드 안 사각형 */
    #hoop-board::after {
      content: ''; position: absolute;
      top: 5px; left: 50%; transform: translateX(-50%);
      width: 22px; height: 16px;
      border: 2px solid #e65100; border-radius: 2px;
    }
    /* 림 (골대 링) */
    #hoop-rim {
      width: 52px; height: 12px;
      border: 5px solid #ff6d00;
      border-radius: 50%;
      margin-top: 2px;
      background: transparent;
      position: relative; z-index: 2;
      box-shadow: 0 3px 6px rgba(255,109,0,0.4);
    }
    /* 그물 */
    #hoop-net {
      width: 40px; height: 36px;
      margin-top: -4px; position: relative; overflow: hidden;
    }
    #hoop-net::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; bottom: 0;
      background:
        repeating-linear-gradient(to bottom, transparent 0px, transparent 7px, rgba(180,180,180,0.7) 7px, rgba(180,180,180,0.7) 8px),
        repeating-linear-gradient(to right,  transparent 0px, transparent 9px, rgba(180,180,180,0.7) 9px, rgba(180,180,180,0.7) 10px);
      clip-path: polygon(10% 0%, 90% 0%, 75% 100%, 25% 100%);
    }
    /* 스윙 애니메이션 */
    @keyframes netSwing { 0%,100%{transform:scaleX(1)} 25%{transform:scaleX(1.08)} 75%{transform:scaleX(0.93)} }
    #trash-bin.scored #hoop-net { animation: netSwing 0.4s ease; }
    /* 던지기 존 힌트 라인 */
    #throw-zone-hint {
      position: fixed; right: 0; top: 0; bottom: 0;
      width: 28%; pointer-events: none; z-index: 999;
      display: none;
      background: linear-gradient(to left, rgba(255,109,0,0.06), transparent);
      border-left: 2px dashed rgba(255,109,0,0.25);
    }
    #throw-zone-hint.visible { display: block; }
    #throw-zone-hint.active  { background: linear-gradient(to left, rgba(255,109,0,0.13), transparent); border-color: rgba(255,109,0,0.5); }

    /* ── oneko 고양이 ── */
    #oneko-cat {
      width: 32px; height: 32px;
      position: fixed; pointer-events: auto;
      image-rendering: pixelated;
      z-index: 9999; cursor: grab;
      transform-origin: top center;
      transition: filter 0.1s;
    }
    #oneko-cat.grabbing-alert {
      animation: nekoScruffGrab 0.18s ease-out forwards;
    }
    @keyframes nekoScruffGrab {
      0%   { transform: scale(1) rotate(0deg); }
      40%  { transform: scale(1.3) rotate(-12deg); }
      70%  { transform: scale(1.15) rotate(8deg); }
      100% { transform: scale(1.15) rotate(0deg); }
    }
    #oneko-cat.held {
      cursor: grabbing;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,0.35));
      animation: nekoDangle 1.2s ease-in-out infinite;
    }
    @keyframes nekoDangle {
      0%,100% { transform: scale(1.15) rotate(-6deg); }
      50%      { transform: scale(1.15) rotate(6deg); }
    }
    #oneko-toggle-btn {
      position: fixed; bottom: 16px; left: 16px;
      background: rgba(255,255,255,0.92); border: 1.5px solid #ddd;
      border-radius: 20px; padding: 5px 12px; font-size: 13px;
      cursor: pointer; z-index: 9998; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      user-select: none; transition: background 0.15s;
    }
    #oneko-toggle-btn:hover { background: #f5f5f5; }

    /* ── 국밥 프로필 카드 ── */
    .gukbap-card {
      background: linear-gradient(135deg, #e8f5e9 0%, #b2dfdb 100%);
      border-color: #80cbc4 !important;
    }
    .gukbap-card:hover { border-color: #4db6ac !important; box-shadow: 0 8px 24px rgba(77,182,172,0.18) !important; }

    /* ── 국밥 메모 헤더 ── */
    .gukbap-header {
      background: linear-gradient(90deg, #4db6ac 0%, #80cbc4 100%) !important;
      position: relative; overflow: hidden;
    }
    .gukbap-header::before {
      content: '🍎🏺';
      position: absolute; right: 38px; top: 50%; transform: translateY(-50%);
      font-size: 11px; opacity: 0.55; pointer-events: none;
      animation: steamRise 2.8s ease-in-out infinite;
    }
    @keyframes steamRise { 0%,100%{opacity:.4;transform:translateY(-50%)} 50%{opacity:.75;transform:translateY(-56%)} }

    /* ── 국밥 메모 바디 ── */
    .gukbap-body {
      background: #f0faf9 !important;
      position: relative;
    }
    .gukbap-body::after {
      content: '';
      position: absolute; inset: 0; border-radius: 0 0 8px 8px;
      background-image: radial-gradient(circle, rgba(77,182,172,0.06) 1px, transparent 1px);
      background-size: 22px 22px;
      pointer-events: none;
    }

    /* ── 국밥 푸터 ── */
    .gukbap-footer::before { content: '🏺 '; }


    /* ── 국밥 메모 테두리 ── */
    .el-gukbap {
      box-shadow: 0 2px 16px rgba(77,182,172,0.15), 0 0 0 1.5px rgba(77,182,172,0.28);
    }
    .el-gukbap:hover {
      box-shadow: 0 6px 28px rgba(77,182,172,0.25), 0 0 0 2px rgba(77,182,172,0.45);
    }
    .el-gukbap.important-flag {
      box-shadow: 0 2px 16px rgba(0,0,0,0.12), 0 0 0 4px #f39c12;
    }
    .el-gukbap.important-flag:hover {
      box-shadow: 0 6px 28px rgba(243,156,18,0.35), 0 0 0 5px #f39c12, 0 0 18px rgba(243,156,18,0.4);
    }

    /* ── 공주 프로필 카드 ── */
    .princess-card {
      background: linear-gradient(135deg, #fff0f6 0%, #fce4ec 100%);
      border-color: #f8bbd0 !important;
    }
    .princess-card:hover { border-color: #e91e8c !important; box-shadow: 0 8px 24px rgba(233,30,140,0.18) !important; }

    /* ── 공주 메모 헤더 ── */
    .princess-header {
      background: linear-gradient(90deg, #e91e8c 0%, #f48fb1 100%) !important;
      position: relative; overflow: hidden;
    }
    .princess-header::before {
      content: '✨💖';
      position: absolute; right: 40px; top: 50%; transform: translateY(-50%);
      font-size: 11px; opacity: 0.55; pointer-events: none;
      animation: sparkle 2.5s ease-in-out infinite;
    }
    @keyframes sparkle { 0%,100%{opacity:.4;transform:translateY(-50%) scale(1)} 50%{opacity:.75;transform:translateY(-55%) scale(1.1)} }

    /* ── 공주 메모 바디 ── */
    .princess-body {
      background: #fff5f9 !important;
      position: relative;
    }
    .princess-body::after {
      content: '';
      position: absolute; inset: 0; border-radius: 0 0 8px 8px;
      background-image: radial-gradient(circle, rgba(233,30,140,0.05) 1px, transparent 1px);
      background-size: 20px 20px;
      pointer-events: none;
    }

    /* ── 공주 푸터 ── */
    .princess-footer::before { content: '🌸 '; }

    /* ── 공주 리본 장식 ── */
    .princess-ribbon {
      position: absolute; top: -14px; left: 10px;
      font-size: 26px; line-height: 1; pointer-events: none;
      animation: floatRibbon 3s ease-in-out infinite;
    }
    @keyframes floatRibbon { 0%,100%{transform:translateY(0) rotate(-6deg)} 50%{transform:translateY(-4px) rotate(6deg)} }

    /* ── 공주 메모 테두리 효과 ── */
    .el-princess {
      box-shadow: 0 2px 16px rgba(233,30,140,0.15), 0 0 0 1.5px rgba(233,30,140,0.25);
    }
    .el-princess:hover {
      box-shadow: 0 6px 28px rgba(233,30,140,0.25), 0 0 0 2px rgba(233,30,140,0.4);
    }
    /* 공주 메모 중요 표시 — !important 없이 우선순위 올리기 */
    .el-princess.important-flag {
      box-shadow: 0 2px 16px rgba(0,0,0,0.12), 0 0 0 4px #f39c12;
    }
    .el-princess.important-flag:hover {
      box-shadow: 0 6px 28px rgba(243,156,18,0.35), 0 0 0 5px #f39c12, 0 0 18px rgba(243,156,18,0.4);
    }
  </style>
</head>
<body>

<!-- 프로필 선택 -->
<div id="login-screen">
  <div class="profile-title">📝 어울림스튜디오 메모장</div>
  <div class="profile-sub">누가 볼 건가요?</div>
  <div class="profile-list">
    <div class="profile-card" onclick="selectProfile('신효범')">
      <div class="profile-avatar" style="background:#eef2ff;">🐶</div>
      <div class="profile-name" style="color:#6366f1;">신효범</div>
    </div>
    <div class="profile-card gukbap-card" onclick="selectProfile('밀양장석현')">
      <div class="profile-avatar" style="background:#e0f2f1; font-size:38px; position:relative;">🍲
        <span style="position:absolute;bottom:2px;right:2px;font-size:18px;">🏺</span>
      </div>
      <div class="profile-name" style="color:#4db6ac;">밀양장석현</div>
    </div>
    <div class="profile-card princess-card" onclick="selectProfile('에겐현진')">
      <div class="profile-avatar" style="background:#fff0f6;">👑</div>
      <div class="profile-name" style="color:#e91e8c;">에겐현진</div>
    </div>
  </div>
</div>

<!-- 메인 앱 -->
<div id="app">
  <header>
    <span class="logo">📝</span>
    <span class="app-title">어울림스튜디오</span>
    <div class="sync-pill synced" id="sync-pill">
      <div class="sync-dot"></div>
      <span id="sync-text">동기화됨</span>
    </div>
    <div class="sep"></div>
    <button class="tool-btn" id="btn-undo" onclick="undo()" title="실행취소 (Ctrl+Z)">↩ 취소</button>
    <button class="tool-btn" id="btn-redo" onclick="redo()" title="다시실행 (Ctrl+Shift+Z)">↪ 다시</button>
    <button class="tool-btn" onclick="resetView()" title="화면 중앙으로 (Ctrl+0)">⌖ 중앙으로</button>
    <button class="tool-btn" id="btn-filter-star" onclick="toggleStarFilter()" title="중요 메모만 보기">☆ 중요만 보기</button>
    <button class="tool-btn" onclick="addSticky()">✏️ 메모 추가</button>
    <button class="tool-btn" onclick="document.getElementById('file-input').click()">🖼 사진 추가</button>
    <div class="user-pill" id="user-pill"></div>
    <button class="logout-btn" onclick="logout()">로그아웃</button>
  </header>
  <div id="viewport">
    <div id="canvas"></div>
    <div id="sel-box"></div>
    <div class="canvas-hint">더블클릭: 메모 추가 · Space+드래그: 화면 이동 · 드래그: 범위 선택 · Shift+클릭: 복수 선택</div>
  </div>
</div>

<input type="file" id="file-input" accept="image/*">
<div id="trash-bin">
  <div id="hoop-board"></div>
  <div id="hoop-rim"></div>
  <div id="hoop-net"></div>
</div>
<div id="throw-zone-hint"></div>
<button id="oneko-toggle-btn" title="고양이 집에 보내기">🐱 집에 보내기</button>


<script>
  const WORKER_URL = "https://eoulrimstudio-upload.eoulrimstudio.workers.dev";

  const PROFILES = {
    '신효범':    { color: '#6366f1', light: '#eef2ff', emoji: '🐶' },
    '밀양장석현': { color: '#4db6ac', light: '#e8f5f4', emoji: '🍲', gukbap: true },
    '에겐현진':  { color: '#e91e8c', light: '#fff0f6', emoji: '👑', princess: true },
  };
  function prof(name) { return PROFILES[name] || { color: '#888', light: '#f5f5f5', emoji: '👤' }; }

  // ── 상태 ──────────────────────────────────────────────
  let currentUser = null;
  let elements = [];
  let vp = { x: 0, y: 0, zoom: 1 };
  let selected = new Set();   // 복수 선택 지원
  let editingId = null;
  let saveTimer = null;
  let pollTimer = null;
  let isDirty = false;
  let action = null;
  let spaceDown = false;
  let starFilterOn = false;

  // Undo/Redo
  let history = [];
  let historyIdx = -1;

  const nodeMap = new Map();
  const canvasEl  = document.getElementById('canvas');
  const viewportEl = document.getElementById('viewport');
  const selBox     = document.getElementById('sel-box');

  // ── 히스토리 ─────────────────────────────────────────
  function snapshot() {
    history = history.slice(0, historyIdx + 1);
    history.push(JSON.parse(JSON.stringify(elements)));
    if (history.length > 60) history.shift(); else historyIdx++;
    updateUndoRedoButtons();
  }

  function undo() {
    if (historyIdx <= 0) return;
    historyIdx--;
    elements = JSON.parse(JSON.stringify(history[historyIdx]));
    stopEditing(); selected.clear(); renderElements(); scheduleSave(); updateUndoRedoButtons();
  }

  function redo() {
    if (historyIdx >= history.length - 1) return;
    historyIdx++;
    elements = JSON.parse(JSON.stringify(history[historyIdx]));
    stopEditing(); selected.clear(); renderElements(); scheduleSave(); updateUndoRedoButtons();
  }

  function updateUndoRedoButtons() {
    document.getElementById('btn-undo').disabled = historyIdx <= 0;
    document.getElementById('btn-redo').disabled = historyIdx >= history.length - 1;
  }

  window.undo = undo;
  window.redo = redo;

  window.resetView = function() {
    if (elements.length === 0) {
      vp = { x: 0, y: 0, zoom: 1 };
      updateTransform();
      return;
    }
    // 전체 메모의 바운딩 박스 계산
    let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
    for (const el of elements) {
      minX = Math.min(minX, el.x); minY = Math.min(minY, el.y);
      maxX = Math.max(maxX, el.x + el.w); maxY = Math.max(maxY, el.y + el.h);
    }
    const r = viewportEl.getBoundingClientRect();
    const pad = 60;
    const scaleX = (r.width  - pad * 2) / (maxX - minX || 1);
    const scaleY = (r.height - pad * 2) / (maxY - minY || 1);
    const zoom = Math.min(1, scaleX, scaleY);
    vp.zoom = zoom;
    vp.x = r.width  / 2 - (minX + (maxX - minX) / 2) * zoom;
    vp.y = r.height / 2 - (minY + (maxY - minY) / 2) * zoom;
    updateTransform();
  };

  // ── 프로필 / 로그인 ───────────────────────────────────
  window.selectProfile = function(name) {
    currentUser = name;
    sessionStorage.setItem('notepad-user', name);
    showApp();
    initOneko();
  };

  window.logout = function() {
    sessionStorage.removeItem('notepad-user');
    clearInterval(pollTimer);
    currentUser = null;
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  };

  function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    const p = prof(currentUser);
    const pill = document.getElementById('user-pill');
    pill.textContent = `${p.emoji} ${currentUser}`;
    pill.style.background = p.color;
    updateUndoRedoButtons();
    fetchData();
    pollTimer = setInterval(() => { if (!isDirty) fetchData(); }, 10000);
  }

  // ── API ───────────────────────────────────────────────
  async function fetchData() {
    setSyncStatus('syncing', '동기화 중...');
    try {
      const res = await fetch(WORKER_URL + '/api/notes');
      const data = await res.json();
      if (data.version === 2 && Array.isArray(data.elements)) {
        for (const remote of data.elements) {
          const local = elements.find(e => e.id === remote.id);
          if (!local) {
            elements.push(remote);
          } else if (remote.updatedAt > local.updatedAt && remote.id !== editingId) {
            Object.assign(local, remote);
          }
        }
        elements = elements.filter(e =>
          e.id === editingId || data.elements.find(r => r.id === e.id)
        );
        renderElements();
        if (history.length === 0) snapshot();
      }
      setSyncStatus('synced', '동기화됨');
    } catch {
      setSyncStatus('error', '연결 오류');
    }
  }

  async function pushData() {
    setSyncStatus('syncing', '저장 중...');
    try {
      await fetch(WORKER_URL + '/api/notes', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ version: 2, elements }),
      });
      isDirty = false;
      setSyncStatus('synced', '저장됨 ✓');
    } catch {
      setSyncStatus('error', '저장 실패');
    }
  }

  function scheduleSave() {
    isDirty = true;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(pushData, 1500);
  }

  function setSyncStatus(state, text) {
    document.getElementById('sync-pill').className = 'sync-pill ' + state;
    document.getElementById('sync-text').textContent = text;
  }

  // ── 좌표 변환 ─────────────────────────────────────────
  function screenToCanvas(sx, sy) {
    const r = viewportEl.getBoundingClientRect();
    return {
      x: (sx - r.left - vp.x) / vp.zoom,
      y: (sy - r.top  - vp.y) / vp.zoom,
    };
  }

  // 뷰포트 내 상대 좌표 → 캔버스 좌표
  function vpRelToCanvas(rx, ry) {
    return { x: (rx - vp.x) / vp.zoom, y: (ry - vp.y) / vp.zoom };
  }

  function updateTransform() {
    canvasEl.style.transform = `translate(${vp.x}px,${vp.y}px) scale(${vp.zoom})`;
  }

  // ── 선택 ─────────────────────────────────────────────
  function selectEl(id, shift = false) {
    if (!id) {
      selected.clear();
    } else if (shift) {
      if (selected.has(id)) selected.delete(id);
      else selected.add(id);
    } else {
      if (!selected.has(id)) { selected.clear(); selected.add(id); }
    }
    updateSelectionVisuals();
  }

  function updateSelectionVisuals() {
    for (const [nid, node] of nodeMap) {
      node.classList.toggle('selected', selected.has(nid));
    }
  }

  // ── 요소 생성 ─────────────────────────────────────────
  function newId() { return 'el_' + Date.now() + '_' + Math.random().toString(36).slice(2,6); }

  function addSticky(canvasX, canvasY) {
    let x, y;
    if (canvasX !== undefined) {
      x = canvasX - 110; y = canvasY - 80;
    } else {
      const r = viewportEl.getBoundingClientRect();
      x = (r.width / 2 - vp.x) / vp.zoom - 110;
      y = (r.height / 2 - vp.y) / vp.zoom - 80;
    }
    const el = {
      id: newId(), type: 'sticky',
      x, y, w: 220, h: 160,
      content: '', author: currentUser, important: false,
      createdAt: Date.now(), updatedAt: Date.now(),
    };
    elements.push(el);
    snapshot();
    renderElements();
    selected.clear(); selected.add(el.id); updateSelectionVisuals();
    setTimeout(() => startEditing(el.id), 30);
    scheduleSave();
  }
  window.addSticky = addSticky;

  function addImage(src) {
    const img = new Image();
    img.onload = () => {
      const MAX = 400;
      const r = Math.min(MAX / img.width, MAX / img.height, 1);
      const w = Math.round(img.width * r);
      const h = Math.round(img.height * r);
      const rect = viewportEl.getBoundingClientRect();
      const cx = (rect.width / 2 - vp.x) / vp.zoom;
      const cy = (rect.height / 2 - vp.y) / vp.zoom;
      const el = {
        id: newId(), type: 'image',
        x: cx - w / 2, y: cy - h / 2,
        w, h, src, author: currentUser, important: false,
        createdAt: Date.now(), updatedAt: Date.now(),
      };
      elements.push(el);
      snapshot();
      renderElements();
      selected.clear(); selected.add(el.id); updateSelectionVisuals();
      scheduleSave();
    };
    img.src = src;
  }

  function deleteSelected() {
    if (selected.size === 0) return;
    stopEditing();
    elements = elements.filter(e => !selected.has(e.id));
    for (const id of selected) {
      const node = nodeMap.get(id);
      if (node) { canvasEl.removeChild(node); nodeMap.delete(id); }
    }
    selected.clear();
    snapshot();
    scheduleSave();
  }

  function toggleImportant(id, eventTarget) {
    const el = elements.find(e => e.id === id);
    if (!el) return;
    el.important = !el.important;
    el.updatedAt = Date.now();
    syncStyle(el);
    snapshot();
    scheduleSave();
    if (el.important && eventTarget) {
      const r = eventTarget.getBoundingClientRect();
      burstStars(r.left + r.width / 2, r.top + r.height / 2);
    }
  }

  // ── 편집 ─────────────────────────────────────────────
  function startEditing(id) {
    editingId = id;
    const node = nodeMap.get(id);
    if (!node) return;
    const ta = node.querySelector('.el-text');
    if (ta) { ta.classList.add('editing'); ta.focus(); }
  }

  function stopEditing() {
    if (!editingId) return;
    const node = nodeMap.get(editingId);
    if (node) { const ta = node.querySelector('.el-text'); if (ta) ta.classList.remove('editing'); }
    editingId = null;
  }

  // ── 렌더 ─────────────────────────────────────────────
  function renderElements() {
    for (const [id, node] of nodeMap) {
      if (!elements.find(e => e.id === id)) { canvasEl.removeChild(node); nodeMap.delete(id); }
    }
    for (const el of elements) {
      if (!nodeMap.has(el.id)) { const node = buildNode(el); canvasEl.appendChild(node); nodeMap.set(el.id, node); }
      syncStyle(el);
    }
    applyStarFilter();
  }

  function applyStarFilter() {
    for (const el of elements) {
      const node = nodeMap.get(el.id);
      if (!node) continue;
      node.style.display = (starFilterOn && !el.important) ? 'none' : 'flex';
    }
  }

  window.toggleStarFilter = function() {
    starFilterOn = !starFilterOn;
    const btn = document.getElementById('btn-filter-star');
    btn.classList.toggle('active', starFilterOn);
    btn.textContent = starFilterOn ? '★ 중요만 보기' : '☆ 중요만 보기';
    applyStarFilter();
  };

  function buildNode(el) {
    const p = prof(el.author);
    const isPrincess = !!p.princess;
    const isGukbap = !!p.gukbap;
    const div = document.createElement('div');
    div.className = `el el-${el.type}` + (isPrincess ? ' el-princess' : isGukbap ? ' el-gukbap' : '');
    div.dataset.id = el.id;

    const header = document.createElement('div');
    header.className = 'el-header' + (isPrincess ? ' princess-header' : isGukbap ? ' gukbap-header' : '');
    if (!isPrincess && !isGukbap) header.style.background = p.color;

    const authorLabel = document.createElement('span');
    authorLabel.className = 'el-author-label';
    authorLabel.textContent = `${p.emoji} ${el.author}`;
    header.appendChild(authorLabel);

    if (isPrincess) {
      const ribbon = document.createElement('span');
      ribbon.className = 'princess-ribbon';
      ribbon.textContent = '🎀';
      div.appendChild(ribbon);
    }

    const starBtn = document.createElement('button');
    starBtn.className = 'star-btn' + (el.important ? ' starred' : '');
    starBtn.title = '중요 표시';
    starBtn.textContent = '★';
    starBtn.addEventListener('mousedown', e => e.stopPropagation());
    starBtn.addEventListener('click', e => { e.stopPropagation(); toggleImportant(el.id, e.currentTarget); });
    header.appendChild(starBtn);

    div.appendChild(header);

    if (el.type === 'sticky') {
      const body = document.createElement('div');
      body.className = 'el-body' + (isPrincess ? ' princess-body' : isGukbap ? ' gukbap-body' : '');
      if (!isPrincess && !isGukbap) body.style.background = p.light;
      const ta = document.createElement('textarea');
      ta.className = 'el-text';
      ta.placeholder = '메모를 입력하세요...';
      ta.value = el.content || '';
      let textSnapshotTimer = null;
      ta.addEventListener('input', () => {
        el.content = ta.value; el.updatedAt = Date.now(); scheduleSave();
        clearTimeout(textSnapshotTimer);
        textSnapshotTimer = setTimeout(snapshot, 1000);
      });
      ta.addEventListener('mousedown', e => { if (editingId === el.id) e.stopPropagation(); });
      body.appendChild(ta);
      div.appendChild(body);
    } else if (el.type === 'image') {
      const body = document.createElement('div');
      body.className = 'el-img-body';
      const img = document.createElement('img');
      img.src = el.src; img.alt = '이미지'; img.draggable = false;
      body.appendChild(img);
      div.appendChild(body);
    }

    const footer = document.createElement('div');
    footer.className = 'el-footer' + (isPrincess ? ' princess-footer' : isGukbap ? ' gukbap-footer' : '');
    footer.textContent = formatDate(el.updatedAt);
    footer.style.background = p.light;
    footer.style.color = p.color;
    footer.style.opacity = '0.85';
    div.appendChild(footer);

    const badge = document.createElement('div');
    badge.className = 'important-badge';
    badge.textContent = '★';
    div.appendChild(badge);


    return div;
  }

  function syncStyle(el) {
    const node = nodeMap.get(el.id);
    if (!node) return;
    const p = prof(el.author);
    node.style.left = el.x + 'px'; node.style.top = el.y + 'px';
    node.style.width = el.w + 'px'; node.style.height = el.h + 'px';
    node.style.zIndex = Math.floor(el.y + el.h);
    node.classList.toggle('selected', selected.has(el.id));
    node.classList.toggle('important-flag', !!el.important);
    const isPrincess = !!p.princess;
    const isGukbap = !!p.gukbap;
    const isCustom = isPrincess || isGukbap;
    const header = node.querySelector('.el-header');
    if (header && !isCustom) header.style.background = p.color;
    const body = node.querySelector('.el-body');
    if (body && !isCustom) body.style.background = p.light;
    const starBtn = node.querySelector('.star-btn');
    if (starBtn) starBtn.className = 'star-btn' + (el.important ? ' starred' : '');
    if (el.type === 'sticky' && editingId !== el.id) {
      const ta = node.querySelector('.el-text');
      if (ta && ta.value !== (el.content || '')) ta.value = el.content || '';
    }
    const footer = node.querySelector('.el-footer');
    if (footer) {
      footer.textContent = formatDate(el.updatedAt);
      footer.style.background = p.light;
      footer.style.color = p.color;
      footer.style.opacity = '0.85';
    }
  }

  // ── 별 파티클 애니메이션 ──────────────────────────────
  function burstStars(cx, cy) {
    const emojis = ['⭐','✨','💫','🌟','⚡'];
    for (let i = 0; i < 10; i++) {
      const p = document.createElement('span');
      p.className = 'star-particle';
      p.textContent = emojis[i % emojis.length];
      const angle = (i / 10) * 360;
      const dist = 55 + Math.random() * 45;
      const rad = angle * Math.PI / 180;
      const tx = `translate(${Math.cos(rad) * dist}px, ${Math.sin(rad) * dist}px)`;
      const rot = (Math.random() - 0.5) * 360 + 'deg';
      p.style.cssText = `left:${cx}px;top:${cy}px;--tx:${tx};--rot:${rot};margin-left:-9px;margin-top:-9px;`;
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 750);
    }
  }

  // ── 마우스 이벤트 ─────────────────────────────────────
  // 중간 버튼(버튼 1) 팬
  viewportEl.addEventListener('mousedown', e => {
    if (e.button === 1) {
      e.preventDefault();
      viewportEl.classList.add('panning');
      action = { type: 'pan', sx: e.clientX, sy: e.clientY, vx: vp.x, vy: vp.y };
      return;
    }
  });

  viewportEl.addEventListener('mousedown', e => {
    if (e.button !== 0) return;

    // 편집 중 처리
    if (editingId) {
      const node = nodeMap.get(editingId);
      if (node?.contains(e.target)) return;
      stopEditing();
    }

    const r = viewportEl.getBoundingClientRect();

    // Space + 드래그 → 팬
    if (spaceDown) {
      viewportEl.classList.add('panning');
      action = { type: 'pan', sx: e.clientX, sy: e.clientY, vx: vp.x, vy: vp.y };
      e.preventDefault();
      return;
    }

    // 테두리 리사이즈 (엣지 감지)
    const elDivR = e.target.closest('.el');
    if (elDivR && !editingId) {
      const dir = getResizeDir(e, elDivR);
      if (dir) {
        const id = elDivR.dataset.id;
        const el = elements.find(x => x.id === id);
        if (el) {
          if (!selected.has(id)) { selected.clear(); selected.add(id); updateSelectionVisuals(); }
          action = { type: 'resize', dir, id, sx: e.clientX, sy: e.clientY, sw: el.w, sh: el.h, sx0: el.x, sy0: el.y };
          e.preventDefault();
          return;
        }
      }
    }

    // 요소 클릭 → 이동 or Alt+드래그 복사
    const elDiv = e.target.closest('.el');
    if (elDiv) {
      const id = elDiv.dataset.id;
      const el = elements.find(x => x.id === id);
      if (!el) return;
      selectEl(id, e.shiftKey);

      if (e.altKey) {
        // Alt+드래그 → 선택된 요소 복제 후 이동
        const clones = [...selected].map(sid => {
          const src = elements.find(x => x.id === sid);
          if (!src) return null;
          const clone = JSON.parse(JSON.stringify(src));
          clone.id = newId();
          clone.x += 16; clone.y += 16;
          clone.createdAt = clone.updatedAt = Date.now();
          elements.push(clone);
          return { origId: sid, cloneId: clone.id };
        }).filter(Boolean);
        renderElements();
        selected.clear();
        clones.forEach(c => selected.add(c.cloneId));
        updateSelectionVisuals();
        const startPositions = clones.map(c => {
          const ce = elements.find(x => x.id === c.cloneId);
          return ce ? { id: c.cloneId, x: ce.x, y: ce.y } : null;
        }).filter(Boolean);
        action = { type: 'move', sx: e.clientX, sy: e.clientY, startPositions, moved: false };
        e.preventDefault();
        return;
      }

      const startPositions = [...selected].map(sid => {
        const sel = elements.find(x => x.id === sid);
        return sel ? { id: sid, x: sel.x, y: sel.y } : null;
      }).filter(Boolean);
      action = { type: 'move', sx: e.clientX, sy: e.clientY, startPositions, moved: false };
      trashBin.classList.add('visible');
      e.preventDefault();
      return;
    }

    // 빈 캔버스 → 범위 선택(마퀴)
    if (!e.shiftKey) selected.clear();
    const mx = e.clientX - r.left;
    const my = e.clientY - r.top;
    action = { type: 'marquee', sx: mx, sy: my, cx: mx, cy: my };
    selBox.style.display = 'block';
    selBox.style.left = mx + 'px'; selBox.style.top = my + 'px';
    selBox.style.width = '0'; selBox.style.height = '0';
    updateSelectionVisuals();
  });

  document.addEventListener('mousemove', e => {
    if (!action) return;
    const dx = e.clientX - action.sx;
    const dy = e.clientY - action.sy;
    const r = viewportEl.getBoundingClientRect();

    if (action.type === 'pan') {
      vp.x = action.vx + dx; vp.y = action.vy + dy;
      updateTransform();

    } else if (action.type === 'move') {
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) action.moved = true;
      for (const sp of action.startPositions) {
        const el = elements.find(x => x.id === sp.id);
        if (!el) continue;
        el.x = sp.x + dx / vp.zoom;
        el.y = sp.y + dy / vp.zoom;
        syncStyle(el);
      }
      scheduleSave();

    } else if (action.type === 'resize') {
      const el = elements.find(x => x.id === action.id);
      if (!el) return;
      const ddx = dx / vp.zoom, ddy = dy / vp.zoom;
      const dir = action.dir;
      if (dir.includes('e'))  el.w = Math.max(100, action.sw + ddx);
      if (dir.includes('s'))  el.h = Math.max(60,  action.sh + ddy);
      if (dir.includes('w'))  { const nw = Math.max(100, action.sw - ddx); el.x = action.sx0 + (action.sw - nw); el.w = nw; }
      if (dir.includes('n'))  { const nh = Math.max(60,  action.sh - ddy); el.y = action.sy0 + (action.sh - nh); el.h = nh; }
      syncStyle(el);
      scheduleSave();

    } else if (action.type === 'marquee') {
      const cx = e.clientX - r.left;
      const cy = e.clientY - r.top;
      action.cx = cx; action.cy = cy;
      const x1 = Math.min(action.sx, cx), y1 = Math.min(action.sy, cy);
      const x2 = Math.max(action.sx, cx), y2 = Math.max(action.sy, cy);
      selBox.style.left = x1 + 'px'; selBox.style.top = y1 + 'px';
      selBox.style.width = (x2 - x1) + 'px'; selBox.style.height = (y2 - y1) + 'px';

      // 마퀴에 완전히 포함된 요소만 선택 (Figma 방식)
      const c1 = vpRelToCanvas(x1, y1);
      const c2 = vpRelToCanvas(x2, y2);
      for (const el of elements) {
        const hit = c1.x <= el.x && c2.x >= el.x + el.w && c1.y <= el.y && c2.y >= el.y + el.h;
        if (hit) selected.add(el.id); else selected.delete(el.id);
      }
      updateSelectionVisuals();
    }
  });

  const EDGE = 8; // px, 리사이즈 감지 영역
  function getResizeDir(e, node) {
    const r = node.getBoundingClientRect();
    const x = e.clientX, y = e.clientY;
    const onL = x - r.left  < EDGE, onR = r.right  - x < EDGE;
    const onT = y - r.top   < EDGE, onB = r.bottom  - y < EDGE;
    if (!onL && !onR && !onT && !onB) return null;
    let d = '';
    if (onT) d += 'n'; else if (onB) d += 's';
    if (onL) d += 'w'; else if (onR) d += 'e';
    return d || null;
  }
  const cursorMap = { n:'ns-resize', s:'ns-resize', e:'ew-resize', w:'ew-resize', ne:'nesw-resize', nw:'nwse-resize', se:'nwse-resize', sw:'nesw-resize' };

  // 엣지 hover → cursor 변경
  document.addEventListener('mousemove', e => {
    if (action) return;
    const elDiv = e.target.closest?.('.el');

    }
  }, true);

  const trashBin = document.getElementById('trash-bin');

  const throwZoneHint = document.getElementById('throw-zone-hint');

  function isOverHoop(cx, cy) {
    const r = trashBin.getBoundingClientRect();
    return cx >= r.left - 16 && cx <= r.right + 16 && cy >= r.top - 16 && cy <= r.bottom + 16;
  }

  function shootIntoHoop(toDelete, releaseX, releaseY) {
    const tr = trashBin.getBoundingClientRect();
    const hoopX = tr.left + tr.width / 2;
    const hoopY = tr.top  + tr.height * 0.42; // rim center
    toDelete.forEach((id, i) => {
      const node = nodeMap.get(id);
      if (!node) return;
      const nr = node.getBoundingClientRect();
      const sx = nr.left + nr.width / 2;
      const sy = nr.top  + nr.height / 2;
      const dx = hoopX - sx;
      const dy = hoopY - sy;
      const dist = Math.sqrt(dx*dx + dy*dy);
      // 포물선 꼭짓점: 날아가는 방향 기준으로 위로 충분히 솟게
      const peakLift = Math.max(dist * 0.55, 120);
      const keyName = `hoopShot${Date.now()}${i}`;
      const st = document.createElement('style');
      st.textContent = `@keyframes ${keyName} {
        0%   { transform:translate(0,0) rotate(0deg) scale(1); opacity:1; }
        40%  { transform:translate(${dx*0.45}px,${dy*0.45 - peakLift}px) rotate(${180}deg) scale(0.78); opacity:1; }
        75%  { transform:translate(${dx*0.82}px,${dy*0.82 - peakLift*0.1}px) rotate(${300}deg) scale(0.55); opacity:0.9; }
        100% { transform:translate(${dx}px,${dy}px) rotate(${360}deg) scale(0.1); opacity:0; }
      }`;
      document.head.appendChild(st);
      node.style.transformOrigin = 'center center';
      node.style.animation = `${keyName} 0.55s cubic-bezier(0.33,1,0.68,1) forwards`;
      setTimeout(() => st.remove(), 800);
    });

    // 골인 효과
    setTimeout(() => {
      trashBin.classList.add('scored');
      // 🏀 파티클
      const hoopCx = tr.left + tr.width/2;
      const hoopCy = tr.top  + tr.height/2;
      ['🏀','✨','💫'].forEach((em, j) => {
        const p = document.createElement('span');
        p.textContent = em;
        p.style.cssText = `position:fixed;left:${hoopCx}px;top:${hoopCy}px;font-size:22px;pointer-events:none;z-index:9999;transition:transform 0.6s ease,opacity 0.6s;`;
        document.body.appendChild(p);
        const angle = (j / 3) * Math.PI * 2 - Math.PI/2;
        const r2 = 40 + j * 12;
        requestAnimationFrame(() => {
          p.style.transform = `translate(${Math.cos(angle)*r2 - 11}px,${Math.sin(angle)*r2 - 11}px)`;
          p.style.opacity = '0';
        });
        setTimeout(() => p.remove(), 650);
      });
      setTimeout(() => trashBin.classList.remove('scored'), 450);
    }, 420);

    setTimeout(() => {
      elements = elements.filter(e => !toDelete.includes(e.id));
      toDelete.forEach(id => {
        const node = nodeMap.get(id);
        if (node) { canvasEl.removeChild(node); nodeMap.delete(id); }
      });
      selected.clear();
      snapshot(); scheduleSave();
    }, 570);
  }

        shootIntoHoop([...selected], e.clientX, e.clientY);
      } else if (action.moved) {
        snapshot();
      }
      trashBin.classList.remove('visible', 'over');
      throwZoneHint.classList.remove('visible', 'active');

    const newZoom = Math.max(0.15, Math.min(5, vp.zoom * factor));
    const r = viewportEl.getBoundingClientRect();
    const mx = e.clientX - r.left, my = e.clientY - r.top;
    vp.x = mx - (mx - vp.x) * (newZoom / vp.zoom);
    vp.y = my - (my - vp.y) * (newZoom / vp.zoom);
    vp.zoom = newZoom;
    updateTransform();
  }, { passive: false });

    // Ctrl+Z
    if (e.key === 'z' && (e.ctrlKey || e.metaKey) && !e.shiftKey) { e.preventDefault(); undo(); return; }
    // Ctrl+Shift+Z / Ctrl+Y
    if ((e.key === 'z' && (e.ctrlKey || e.metaKey) && e.shiftKey) ||
        (e.key === 'y' && (e.ctrlKey || e.metaKey))) { e.preventDefault(); redo(); return; }

    if ((e.key === 'Delete' || e.key === 'Backspace') && selected.size > 0) {

  // ── 날짜 포맷 ─────────────────────────────────────────
  const DAYS = ['일','월','화','수','목','금','토'];
  function formatDate(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    const yy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    const day = DAYS[d.getDay()];
    const hh = String(d.getHours()).padStart(2, '0');
    const mi = String(d.getMinutes()).padStart(2, '0');
    return `${yy}.${mm}.${dd} (${day}) ${hh}:${mi}`;
  }

  function fileToBase64(file) {
    return new Promise(resolve => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        const MAX = 1200;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) { const r = Math.min(MAX/w, MAX/h); w = Math.round(w*r); h = Math.round(h*r); }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        resolve(c.toDataURL('image/jpeg', 0.85));
      };
      img.src = url;
    });
  }

    function resetIdle() { idleAnimation = null; idleAnimationFrame = 0; }

    function idle() {
      idleTime++;
      if (idleTime > 10 && Math.floor(Math.random() * 200) === 0 && !idleAnimation) {
        const opts = ['sleeping', 'scratchSelf'];
        if (nekoPosX < 32) opts.push('scratchWallW');
        if (nekoPosY < 32) opts.push('scratchWallN');
        if (nekoPosX > window.innerWidth  - 32) opts.push('scratchWallE');
        if (nekoPosY > window.innerHeight - 32) opts.push('scratchWallS');
        idleAnimation = opts[Math.floor(Math.random() * opts.length)];
      }
      switch (idleAnimation) {
        case 'sleeping':
          if (idleAnimationFrame < 8) { setSprite('tired', 0); break; }
          setSprite('sleeping', Math.floor(idleAnimationFrame / 4));
          if (idleAnimationFrame > 192) resetIdle();
          break;
        case 'scratchWallN': case 'scratchWallS':
        case 'scratchWallE': case 'scratchWallW': case 'scratchSelf':
          setSprite(idleAnimation, idleAnimationFrame);

      const dy = nekoPosY - mousePosY;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < SPEED || dist < 48) { idle(); return; }
      idleAnimation = null; idleAnimationFrame = 0;
      if (idleTime > 1) {
        setSprite('alert', 0);
        idleTime = Math.min(idleTime, 7) - 1;
        return;
      }
      idleTime = 0;
      let dir = '';
      dir += dy / dist >  0.5 ? 'N' : '';
      dir += dy / dist < -0.5 ? 'S' : '';
      dir += dx / dist >  0.5 ? 'W' : '';
      dir += dx / dist < -0.5 ? 'E' : '';
      setSprite(dir, frameCount);
      nekoPosX -= (dx / dist) * SPEED;
      nekoPosY -= (dy / dist) * SPEED;
      nekoPosX = Math.min(Math.max(16, nekoPosX), window.innerWidth  - 16);
      nekoPosY = Math.min(Math.max(16, nekoPosY), window.innerHeight - 16);
      onekoEl.style.left = (nekoPosX - 16) + 'px';
      onekoEl.style.top  = (nekoPosY - 16) + 'px';
    }

    let lastTs;
    function loop() {
      if (!onekoEl?.isConnected) return;
      if (!lastTs) lastTs = performance.now();
      if (performance.now() - lastTs > 100) { lastTs = performance.now(); frame(); }
      requestAnimationFrame(loop);
    }
    loop();

    // 집에 보내기 토글
    const toggleBtn = document.getElementById('oneko-toggle-btn');
    let catVisible = true;
    toggleBtn.addEventListener('click', () => {
      catVisible = !catVisible;
      onekoEl.style.display = catVisible ? 'block' : 'none';
      toggleBtn.textContent = catVisible ? '🐱 집에 보내기' : '🐱 고양이 부르기';
    });
  }

  // ── 초기화 ───────────────────────────────────────────
  updateTransform();
  updateUndoRedoButtons();
  const savedUser = sessionStorage.getItem('notepad-user');
  if (savedUser) { currentUser = savedUser; showApp(); initOneko(); }
</script>
</body>
</html>
