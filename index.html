<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>어울림스튜디오 메모장</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }

    /* 토큰 설정 화면 */
    #token-screen {
      display: none;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #141414;
    }

    .token-card {
      background: #1e1e1e;
      border-radius: 12px;
      padding: 40px;
      width: 420px;
      text-align: center;
      border: 1px solid #333;
    }

    .token-card h2 { color: white; font-size: 18px; margin-bottom: 10px; }
    .token-card p { color: #888; font-size: 13px; margin-bottom: 24px; line-height: 1.6; }

    .token-card input {
      width: 100%;
      padding: 12px 14px;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 8px;
      color: white;
      font-size: 14px;
      margin-bottom: 12px;
      outline: none;
      font-family: monospace;
    }

    .token-card input:focus { border-color: #667eea; }

    .token-card button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
    }

    .token-card button:hover { background: #5a6fd6; }
    .token-error { color: #e74c3c; font-size: 12px; margin-top: 10px; display: none; }

    /* 프로필 선택 화면 */
    #login-screen {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #141414;
    }

    .profile-screen-title {
      color: white;
      font-size: 34px;
      font-weight: 400;
      margin-bottom: 48px;
    }

    .profile-list {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .profile-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      cursor: pointer;
    }

    .profile-avatar {
      width: 120px;
      height: 120px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      border: 3px solid transparent;
      transition: border-color 0.15s, transform 0.15s;
      user-select: none;
    }

    .profile-card:hover .profile-avatar { border-color: white; transform: scale(1.05); }
    .profile-name { color: #aaa; font-size: 15px; font-weight: 500; transition: color 0.15s; }
    .profile-card:hover .profile-name { color: white; }

    /* 메인 앱 */
    #app { display: none; }

    header {
      background: white;
      border-bottom: 1px solid #e8e8e8;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo { font-size: 24px; }
    header h1 { font-size: 17px; color: #1a1a2e; font-weight: 700; }

    .sync-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 20px;
      transition: all 0.3s;
    }
    .sync-indicator.synced { color: #27ae60; background: #eafaf1; }
    .sync-indicator.syncing { color: #e67e22; background: #fff9f0; }
    .sync-indicator.error { color: #e74c3c; background: #fff0f0; }

    .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
    .sync-indicator.synced .sync-dot { animation: pulse 2s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    .header-right { display: flex; align-items: center; gap: 12px; }

    .user-badge {
      background: #f0f2f5;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      color: #555;
      font-weight: 500;
    }

    .logout-btn {
      background: none;
      border: 1px solid #ddd;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 13px;
      color: #888;
      cursor: pointer;
    }
    .logout-btn:hover { border-color: #999; color: #555; }

    .layout { display: flex; height: calc(100vh - 60px); }

    .sidebar {
      width: 260px;
      background: white;
      border-right: 1px solid #e8e8e8;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-title {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .add-note-btn {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }
    .add-note-btn:hover { opacity: 0.85; }

    .notes-list { flex: 1; overflow-y: auto; padding: 8px; }

    .note-item {
      padding: 12px 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 2px;
      border: 2px solid transparent;
    }
    .note-item:hover { background: #f7f8fa; }
    .note-item.active { background: #f0f0ff; border-color: #667eea22; }

    .note-item-title {
      font-size: 14px;
      font-weight: 600;
      color: #2c2c2c;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .note-item-preview {
      font-size: 12px;
      color: #aaa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .note-item-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 6px;
    }

    .note-item-time { font-size: 11px; color: #ccc; }

    .note-item-author {
      font-size: 11px;
      color: #9b59b6;
      background: #f5eeff;
      padding: 2px 8px;
      border-radius: 10px;
    }

    .editor-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    .editor-toolbar {
      padding: 12px 24px;
      background: white;
      border-bottom: 1px solid #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    #note-title-input {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a2e;
      border: none;
      outline: none;
      flex: 1;
      background: transparent;
    }
    #note-title-input::placeholder { color: #ccc; }

    .editor-actions { display: flex; align-items: center; gap: 8px; }
    .save-status { font-size: 12px; color: #aaa; }

    .delete-btn {
      padding: 6px 14px;
      background: none;
      border: 1px solid #ffc0c0;
      color: #e74c3c;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }
    .delete-btn:hover { background: #fff0f0; }

    #note-content {
      flex: 1;
      padding: 24px;
      font-size: 15px;
      line-height: 1.8;
      color: #2c2c2c;
      border: none;
      outline: none;
      resize: none;
      background: #fafafa;
      font-family: inherit;
    }
    #note-content::placeholder { color: #ddd; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #ccc;
      gap: 12px;
    }
    .empty-state .icon { font-size: 64px; }
    .empty-state p { font-size: 15px; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
  </style>
</head>
<body>

<!-- GitHub 토큰 설정 (최초 1회) -->
<div id="token-screen">
  <div class="token-card">
    <h2>🔑 초기 설정</h2>
    <p>GitHub Personal Access Token을 입력하세요.<br>한 번만 입력하면 이 기기에 저장됩니다.<br><br>토큰 권한: <strong>Contents → Read and write</strong></p>
    <input type="password" id="token-input" placeholder="github_pat_..." />
    <button onclick="saveToken()">저장</button>
    <div class="token-error" id="token-error"></div>
  </div>
</div>

<!-- 프로필 선택 화면 -->
<div id="login-screen">
  <div class="profile-screen-title">누가 볼 건가요?</div>
  <div class="profile-list">
    <div class="profile-card" onclick="selectProfile('신효범')">
      <div class="profile-avatar" style="background:#5b6ee8;">🐻</div>
      <div class="profile-name">신효범</div>
    </div>
    <div class="profile-card" onclick="selectProfile('밀양장석현')">
      <div class="profile-avatar" style="background:#e8845b;">🦊</div>
      <div class="profile-name">밀양장석현</div>
    </div>
    <div class="profile-card" onclick="selectProfile('에겐현진')">
      <div class="profile-avatar" style="background:#5be8a0;">🐱</div>
      <div class="profile-name">에겐현진</div>
    </div>
  </div>
</div>

<!-- 메인 앱 -->
<div id="app">
  <header>
    <div class="header-left">
      <span class="header-logo">📝</span>
      <h1>어울림스튜디오 메모장</h1>
      <div class="sync-indicator synced" id="sync-indicator">
        <div class="sync-dot"></div>
        <span id="sync-text">동기화됨</span>
      </div>
    </div>
    <div class="header-right">
      <span class="user-badge" id="user-name-display"></span>
      <button class="logout-btn" onclick="logout()">로그아웃</button>
    </div>
  </header>

  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">메모</span>
        <button class="add-note-btn" onclick="createNote()" title="새 메모">+</button>
      </div>
      <div class="notes-list" id="notes-list"></div>
    </div>

    <div class="editor-area">
      <div class="empty-state" id="empty-state">
        <div class="icon">📄</div>
        <p>왼쪽에서 메모를 선택하거나 새로 만드세요</p>
      </div>
      <div id="editor" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
        <div class="editor-toolbar">
          <input type="text" id="note-title-input" placeholder="제목을 입력하세요" />
          <div class="editor-actions">
            <span class="save-status" id="save-status"></span>
            <button class="delete-btn" onclick="deleteNote()">삭제</button>
          </div>
        </div>
        <textarea id="note-content" placeholder="여기에 메모를 작성하세요...&#10;&#10;저장하면 팀원들과 공유됩니다 ✨"></textarea>
      </div>
    </div>
  </div>
</div>

<script>
  const REPO = "shinhp3/eoulrimstudio-note";
  const FILE = "notes.json";
  const RAW_URL = `https://raw.githubusercontent.com/${REPO}/main/${FILE}`;
  const API_URL = `https://api.github.com/repos/${REPO}/contents/${FILE}`;

  let currentUser = null;
  let notes = {};
  let fileSha = null;
  let currentNoteId = null;
  let saveTimer = null;
  let pollTimer = null;
  let isDirty = false;
  let ghToken = null;

  // ─── 토큰 설정 ───
  window.saveToken = async function () {
    const val = document.getElementById("token-input").value.trim();
    if (!val) return;
    const errEl = document.getElementById("token-error");
    errEl.style.display = "none";

    try {
      const res = await fetch(API_URL, {
        headers: { Authorization: `Bearer ${val}`, "Cache-Control": "no-cache" }
      });
      if (!res.ok) throw new Error();
      ghToken = val;
      localStorage.setItem("gh-token", val);
      showLogin();
    } catch {
      errEl.textContent = "토큰이 올바르지 않거나 권한이 없습니다.";
      errEl.style.display = "block";
    }
  };

  document.getElementById("token-input").addEventListener("keydown", e => {
    if (e.key === "Enter") window.saveToken();
  });

  // ─── 프로필 선택 ───
  window.selectProfile = function (name) {
    currentUser = name;
    sessionStorage.setItem("notepad-user", name);
    showApp();
  };

  window.logout = function () {
    sessionStorage.removeItem("notepad-user");
    clearInterval(pollTimer);
    currentUser = null;
    currentNoteId = null;
    isDirty = false;
    document.getElementById("app").style.display = "none";
    showLogin();
  };

  function showLogin() {
    document.getElementById("login-screen").style.display = "flex";
    document.getElementById("token-screen").style.display = "none";
    document.getElementById("app").style.display = "none";
  }

  function showApp() {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("user-name-display").textContent = currentUser;
    fetchNotes();
    pollTimer = setInterval(() => { if (!isDirty) fetchNotes(); }, 10000);
  }

  // ─── GitHub에서 notes.json 읽기 ───
  async function fetchNotes() {
    setSyncStatus("syncing", "동기화 중...");
    try {
      const res = await fetch(RAW_URL + "?t=" + Date.now());
      const data = await res.json();
      notes = data;

      // sha는 API로 가져와야 함 (쓰기용)
      const apiRes = await fetch(API_URL, {
        headers: { Authorization: `Bearer ${ghToken}` }
      });
      const meta = await apiRes.json();
      fileSha = meta.sha;

      renderNotesList();

      // 현재 편집 중 아닐 때만 내용 갱신
      if (currentNoteId && notes[currentNoteId] && !isDirty) {
        document.getElementById("note-title-input").value = notes[currentNoteId].title || "";
        document.getElementById("note-content").value = notes[currentNoteId].content || "";
      }

      setSyncStatus("synced", "동기화됨");
    } catch {
      setSyncStatus("error", "연결 오류");
    }
  }

  // ─── GitHub에 notes.json 저장 ───
  async function pushNotes() {
    const content = btoa(unescape(encodeURIComponent(JSON.stringify(notes, null, 2))));
    const res = await fetch(API_URL, {
      method: "PUT",
      headers: {
        Authorization: `Bearer ${ghToken}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        message: `메모 업데이트 - ${currentUser}`,
        content,
        sha: fileSha
      })
    });
    if (!res.ok) throw new Error();
    const data = await res.json();
    fileSha = data.content.sha;
  }

  function setSyncStatus(state, text) {
    const el = document.getElementById("sync-indicator");
    el.className = "sync-indicator " + state;
    document.getElementById("sync-text").textContent = text;
  }

  // ─── 메모 목록 렌더링 ───
  function renderNotesList() {
    const list = document.getElementById("notes-list");
    const sorted = Object.entries(notes)
      .sort(([, a], [, b]) => (b.updatedAt || 0) - (a.updatedAt || 0));

    if (sorted.length === 0) {
      list.innerHTML = '<div style="padding:20px;text-align:center;color:#ccc;font-size:13px;">메모가 없습니다<br>+ 버튼으로 추가하세요</div>';
      return;
    }

    list.innerHTML = sorted.map(([id, note]) => `
      <div class="note-item ${id === currentNoteId ? "active" : ""}" onclick="selectNote('${id}')">
        <div class="note-item-title">${escapeHtml(note.title || "제목 없음")}</div>
        <div class="note-item-preview">${escapeHtml((note.content || "").slice(0, 40) || "내용 없음")}</div>
        <div class="note-item-meta">
          <span class="note-item-time">${formatTime(note.updatedAt)}</span>
          <span class="note-item-author">${escapeHtml(note.author || "")}</span>
        </div>
      </div>
    `).join("");
  }

  // ─── 메모 선택 ───
  window.selectNote = function (id) {
    currentNoteId = id;
    isDirty = false;
    const note = notes[id];
    renderNotesList();
    document.getElementById("empty-state").style.display = "none";
    document.getElementById("editor").style.display = "flex";
    document.getElementById("note-title-input").value = note.title || "";
    document.getElementById("note-content").value = note.content || "";
    document.getElementById("save-status").textContent = "";
  };

  // ─── 새 메모 ───
  window.createNote = async function () {
    const id = "note_" + Date.now();
    notes[id] = { id, title: "새 메모", content: "", author: currentUser, updatedAt: Date.now(), createdAt: Date.now() };
    renderNotesList();
    selectNote(id);
    setSyncStatus("syncing", "저장 중...");
    try {
      await pushNotes();
      setSyncStatus("synced", "동기화됨");
    } catch {
      setSyncStatus("error", "저장 실패");
    }
    setTimeout(() => { const t = document.getElementById("note-title-input"); t.focus(); t.select(); }, 50);
  };

  // ─── 메모 삭제 ───
  window.deleteNote = async function () {
    if (!currentNoteId || !confirm("이 메모를 삭제할까요?")) return;
    delete notes[currentNoteId];
    currentNoteId = null;
    isDirty = false;
    renderNotesList();
    document.getElementById("editor").style.display = "none";
    document.getElementById("empty-state").style.display = "flex";
    setSyncStatus("syncing", "저장 중...");
    try { await pushNotes(); setSyncStatus("synced", "동기화됨"); }
    catch { setSyncStatus("error", "저장 실패"); }
  };

  // ─── 자동 저장 ───
  async function saveNote() {
    if (!currentNoteId) return;
    notes[currentNoteId] = {
      ...notes[currentNoteId],
      title: document.getElementById("note-title-input").value,
      content: document.getElementById("note-content").value,
      author: currentUser,
      updatedAt: Date.now()
    };
    document.getElementById("save-status").textContent = "저장 중...";
    try {
      await pushNotes();
      isDirty = false;
      document.getElementById("save-status").textContent = "저장됨 ✓";
      renderNotesList();
    } catch {
      document.getElementById("save-status").textContent = "저장 실패";
    }
  }

  function scheduleSave() {
    isDirty = true;
    document.getElementById("save-status").textContent = "입력 중...";
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveNote, 1500);
  }

  document.getElementById("note-title-input").addEventListener("input", scheduleSave);
  document.getElementById("note-content").addEventListener("input", scheduleSave);

  // ─── 유틸 ───
  function formatTime(ts) {
    if (!ts) return "";
    const d = new Date(ts);
    const now = new Date();
    if (d.toDateString() === now.toDateString())
      return d.toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" });
    return d.toLocaleDateString("ko-KR", { month: "short", day: "numeric" });
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  // ─── 초기화 ───
  ghToken = localStorage.getItem("gh-token");
  if (!ghToken) {
    document.getElementById("token-screen").style.display = "flex";
  } else {
    const savedUser = sessionStorage.getItem("notepad-user");
    if (savedUser) { currentUser = savedUser; showApp(); }
    else showLogin();
  }
</script>
</body>
</html>
