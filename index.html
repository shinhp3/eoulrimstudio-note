<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>어울림스튜디오 메모장</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', -apple-system, sans-serif; overflow: hidden; background: #f0f2f5; }

    /* ── 프로필 화면 ── */
    #login-screen {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      min-height: 100vh; background: #f0f2f5;
    }
    .profile-title { color: #1a1a2e; font-size: 30px; font-weight: 600; margin-bottom: 12px; }
    .profile-sub { color: #888; font-size: 14px; margin-bottom: 48px; }
    .profile-list { display: flex; gap: 28px; flex-wrap: wrap; justify-content: center; }
    .profile-card {
      display: flex; flex-direction: column; align-items: center; gap: 12px;
      cursor: pointer; padding: 24px; border-radius: 16px;
      background: white; border: 2px solid #eee;
      transition: all 0.15s; box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .profile-card:hover { border-color: #667eea; transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
    .profile-avatar {
      width: 100px; height: 100px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 44px; user-select: none;
    }
    .profile-name { color: #333; font-size: 15px; font-weight: 600; }

    /* ── 앱 ── */
    #app { display: none; flex-direction: column; height: 100vh; }

    /* ── 헤더 ── */
    header {
      height: 52px; background: white; border-bottom: 1px solid #e8e8e8;
      display: flex; align-items: center; padding: 0 16px; gap: 8px;
      flex-shrink: 0; z-index: 200; box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .logo { font-size: 20px; }
    .app-title { color: #1a1a2e; font-size: 15px; font-weight: 700; margin-right: 4px; }
    .sync-pill {
      display: flex; align-items: center; gap: 5px; font-size: 11px;
      padding: 3px 9px; border-radius: 20px; transition: all 0.3s;
    }
    .sync-pill.synced { color: #27ae60; background: #eafaf1; }
    .sync-pill.syncing { color: #e67e22; background: #fff4e6; }
    .sync-pill.error   { color: #e74c3c; background: #fdf2f2; }
    .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
    .sync-pill.synced .sync-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .sep { flex: 1; }
    .tool-btn {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 12px; border-radius: 8px; border: 1px solid #e0e0e0;
      background: white; color: #555; font-size: 13px; cursor: pointer;
      transition: all 0.15s; white-space: nowrap;
    }
    .tool-btn:hover { background: #f5f5f5; border-color: #ccc; color: #222; }
    .tool-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .user-pill { padding: 5px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; color: white; }
    .logout-btn {
      background: none; border: 1px solid #e0e0e0; padding: 5px 12px;
      border-radius: 8px; font-size: 12px; color: #aaa; cursor: pointer;
    }
    .logout-btn:hover { border-color: #bbb; color: #666; }

    /* ── 캔버스 ── */
    #viewport {
      flex: 1; position: relative; overflow: hidden;
      background-color: #f0f2f5;
      background-image: radial-gradient(circle, #c8ccd4 1px, transparent 1px);
      background-size: 28px 28px;
      cursor: default;
    }
    #viewport.space-mode { cursor: grab !important; }
    #viewport.space-mode.panning { cursor: grabbing !important; }
    #canvas { position: absolute; top: 0; left: 0; width: 0; height: 0; transform-origin: 0 0; }

    /* ── 드래그 선택 박스 ── */
    #sel-box {
      position: absolute; display: none; pointer-events: none; z-index: 50;
      border: 1.5px solid #667eea;
      background: rgba(99,102,241,0.08);
      border-radius: 2px;
    }

    /* ── 요소 공통 ── */
    .el {
      position: absolute; border-radius: 8px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.12);
      display: flex; flex-direction: column;
      transition: box-shadow 0.15s;
    }
    .el:hover { box-shadow: 0 4px 24px rgba(0,0,0,0.18); }
    .el.selected { outline: 3px solid #667eea; outline-offset: 2px; }
    /* 중요 표시 — 굵은 주황 테두리 */
    .el.important-flag {
      box-shadow: 0 2px 16px rgba(0,0,0,0.12), 0 0 0 4px #f39c12;
      transition: box-shadow 0.2s, transform 0.2s, filter 0.2s;
    }
    .el.important-flag:hover {
      transform: scale(1.04);
      box-shadow: 0 8px 36px rgba(243,156,18,0.45), 0 0 0 5px #f39c12, 0 0 28px rgba(243,156,18,0.55);
      filter: brightness(1.06);
      z-index: 20;
    }
    .el.important-flag.selected { outline: 3px solid #667eea; outline-offset: 5px; box-shadow: 0 2px 16px rgba(0,0,0,0.12), 0 0 0 5px #f39c12; }

    .el-header {
      height: 34px; display: flex; align-items: center; padding: 0 8px;
      border-radius: 8px 8px 0 0; cursor: grab; flex-shrink: 0; gap: 6px;
    }
    .el-header:active { cursor: grabbing; }
    .el-author-label { font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.95); flex: 1; }

    /* 중요 버튼 */
    .star-btn {
      width: 30px; height: 30px; border-radius: 7px; border: none;
      background: rgba(255,255,255,0.2); color: rgba(255,255,255,0.65);
      font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; flex-shrink: 0; line-height: 1;
    }
    .star-btn:hover { background: rgba(255,255,255,0.35); color: white; transform: scale(1.15); }
    .star-btn.starred { color: #ffd700; background: rgba(255,215,0,0.3); filter: drop-shadow(0 0 4px rgba(255,215,0,0.8)); }

    /* 중요 배지 */
    .important-badge {
      position: absolute; top: -14px; right: -14px;
      width: 32px; height: 32px; border-radius: 50%;
      background: #f39c12; color: white; font-size: 17px;
      display: none; align-items: center; justify-content: center;
      box-shadow: 0 3px 10px rgba(243,156,18,0.65); z-index: 5;
      border: 2px solid white;
    }
    .el.important-flag .important-badge { display: flex; }

    /* ── 날짜 푸터 ── */
    .el-footer {
      padding: 3px 10px 5px; text-align: right;
      font-size: 10px; color: rgba(0,0,0,0.35); flex-shrink: 0;
      border-radius: 0 0 8px 8px; line-height: 1.4;
      background: inherit;
    }

    /* ── 스티커 노트 ── */
    .el-body { flex: 1; border-radius: 0; padding: 10px; min-height: 0; }
    .el-text {
      width: 100%; height: 100%; border: none; outline: none; resize: none;
      font-size: 13px; line-height: 1.75; background: transparent;
      color: #2c2c2c; font-family: inherit; pointer-events: none; cursor: default;
    }
    .el-text.editing { pointer-events: auto; cursor: text; }

    /* ── 이미지 ── */
    .el-img-body { flex: 1; border-radius: 0 0 8px 8px; overflow: hidden; background: #f8f8f8; }
    .el-img-body img { width: 100%; height: 100%; object-fit: contain; display: block; pointer-events: none; }

    /* ── 리사이즈 핸들 ── */
    .resize-handle {
      position: absolute; right: -6px; bottom: -6px;
      width: 13px; height: 13px; border-radius: 3px;
      cursor: nwse-resize; background: white; border: 2px solid #667eea;
      opacity: 0; transition: opacity 0.15s; z-index: 10;
    }
    .el.selected .resize-handle { opacity: 1; }

    /* ── 힌트 ── */
    .canvas-hint {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      color: #bbb; font-size: 12px; pointer-events: none;
      background: rgba(0,0,0,0.05); padding: 6px 16px; border-radius: 20px;
      white-space: nowrap;
    }

    #file-input { display: none; }

    /* ── 공주 프로필 카드 ── */
    .princess-card {
      background: linear-gradient(135deg, #fff0f6 0%, #fce4ec 100%);
      border-color: #f8bbd0 !important;
    }
    .princess-card:hover { border-color: #e91e8c !important; box-shadow: 0 8px 24px rgba(233,30,140,0.18) !important; }

    /* ── 공주 메모 헤더 — 그라데이션 + 반짝이 ── */
    .princess-header {
      background: linear-gradient(90deg, #e91e8c 0%, #f06292 60%, #ce93d8 100%) !important;
      position: relative; overflow: hidden;
    }
    .princess-header::before {
      content: '✨💖✨';
      position: absolute; right: 40px; top: 50%; transform: translateY(-50%);
      font-size: 11px; opacity: 0.7; pointer-events: none;
      animation: sparkle 2.5s ease-in-out infinite;
    }
    @keyframes sparkle { 0%,100%{opacity:.5;transform:translateY(-50%) scale(1)} 50%{opacity:1;transform:translateY(-55%) scale(1.1)} }

    /* ── 공주 메모 바디 ── */
    .princess-body {
      background: linear-gradient(160deg, #fff0f8 0%, #fce4ec 100%) !important;
      position: relative;
    }
    .princess-body::after {
      content: '';
      position: absolute; inset: 0; border-radius: 0 0 8px 8px;
      background-image:
        radial-gradient(circle, rgba(233,30,140,0.08) 1px, transparent 1px),
        radial-gradient(circle, rgba(206,147,216,0.07) 1px, transparent 1px);
      background-size: 18px 18px, 26px 26px;
      background-position: 0 0, 9px 9px;
      pointer-events: none;
    }

    /* ── 공주 푸터 ── */
    .princess-footer {
      background: linear-gradient(90deg, #fce4ec, #f8bbd0) !important;
      color: #c2185b !important;
    }
    .princess-footer::before { content: '🌸 '; }

    /* ── 공주 리본 장식 ── */
    .princess-ribbon {
      position: absolute; top: -8px; left: 12px;
      font-size: 18px; line-height: 1; pointer-events: none;
      animation: floatRibbon 3s ease-in-out infinite;
    }
    @keyframes floatRibbon { 0%,100%{transform:translateY(0) rotate(-5deg)} 50%{transform:translateY(-3px) rotate(5deg)} }

    /* ── 공주 메모 테두리 효과 ── */
    .el-princess {
      box-shadow: 0 2px 16px rgba(233,30,140,0.15), 0 0 0 1.5px rgba(233,30,140,0.25) !important;
    }
    .el-princess:hover {
      box-shadow: 0 6px 28px rgba(233,30,140,0.25), 0 0 0 2px rgba(233,30,140,0.4) !important;
    }
  </style>
</head>
<body>

<!-- 프로필 선택 -->
<div id="login-screen">
  <div class="profile-title">📝 어울림스튜디오 메모장</div>
  <div class="profile-sub">누가 볼 건가요?</div>
  <div class="profile-list">
    <div class="profile-card" onclick="selectProfile('신효범')">
      <div class="profile-avatar" style="background:#eef2ff;">🐻</div>
      <div class="profile-name" style="color:#6366f1;">신효범</div>
    </div>
    <div class="profile-card" onclick="selectProfile('밀양장석현')">
      <div class="profile-avatar" style="background:#fff7ed;">🦊</div>
      <div class="profile-name" style="color:#f97316;">밀양장석현</div>
    </div>
    <div class="profile-card princess-card" onclick="selectProfile('에겐현진')">
      <div class="profile-avatar" style="background:#fff0f6;">👑</div>
      <div class="profile-name" style="color:#e91e8c;">에겐현진</div>
    </div>
  </div>
</div>

<!-- 메인 앱 -->
<div id="app">
  <header>
    <span class="logo">📝</span>
    <span class="app-title">어울림스튜디오</span>
    <div class="sync-pill synced" id="sync-pill">
      <div class="sync-dot"></div>
      <span id="sync-text">동기화됨</span>
    </div>
    <div class="sep"></div>
    <button class="tool-btn" id="btn-undo" onclick="undo()" title="실행취소 (Ctrl+Z)">↩ 취소</button>
    <button class="tool-btn" id="btn-redo" onclick="redo()" title="다시실행 (Ctrl+Shift+Z)">↪ 다시</button>
    <button class="tool-btn" onclick="addSticky()">✏️ 메모 추가</button>
    <button class="tool-btn" onclick="document.getElementById('file-input').click()">🖼 사진 추가</button>
    <div class="user-pill" id="user-pill"></div>
    <button class="logout-btn" onclick="logout()">로그아웃</button>
  </header>
  <div id="viewport">
    <div id="canvas"></div>
    <div id="sel-box"></div>
    <div class="canvas-hint">더블클릭: 메모 추가 · Space+드래그: 화면 이동 · 드래그: 범위 선택 · Shift+클릭: 복수 선택</div>
  </div>
</div>

<input type="file" id="file-input" accept="image/*">

<script>
  const WORKER_URL = "https://eoulrimstudio-upload.eoulrimstudio.workers.dev";

  const PROFILES = {
    '신효범':    { color: '#6366f1', light: '#eef2ff', emoji: '🐻' },
    '밀양장석현': { color: '#f97316', light: '#fff7ed', emoji: '🦊' },
    '에겐현진':  { color: '#e91e8c', light: '#fff0f6', emoji: '👑', princess: true },
  };
  function prof(name) { return PROFILES[name] || { color: '#888', light: '#f5f5f5', emoji: '👤' }; }

  // ── 상태 ──────────────────────────────────────────────
  let currentUser = null;
  let elements = [];
  let vp = { x: 0, y: 0, zoom: 1 };
  let selected = new Set();   // 복수 선택 지원
  let editingId = null;
  let saveTimer = null;
  let pollTimer = null;
  let isDirty = false;
  let action = null;
  let spaceDown = false;

  // Undo/Redo
  let history = [];
  let historyIdx = -1;

  const nodeMap = new Map();
  const canvasEl  = document.getElementById('canvas');
  const viewportEl = document.getElementById('viewport');
  const selBox     = document.getElementById('sel-box');

  // ── 히스토리 ─────────────────────────────────────────
  function snapshot() {
    history = history.slice(0, historyIdx + 1);
    history.push(JSON.parse(JSON.stringify(elements)));
    if (history.length > 60) history.shift(); else historyIdx++;
    updateUndoRedoButtons();
  }

  function undo() {
    if (historyIdx <= 0) return;
    historyIdx--;
    elements = JSON.parse(JSON.stringify(history[historyIdx]));
    stopEditing(); selected.clear(); renderElements(); scheduleSave(); updateUndoRedoButtons();
  }

  function redo() {
    if (historyIdx >= history.length - 1) return;
    historyIdx++;
    elements = JSON.parse(JSON.stringify(history[historyIdx]));
    stopEditing(); selected.clear(); renderElements(); scheduleSave(); updateUndoRedoButtons();
  }

  function updateUndoRedoButtons() {
    document.getElementById('btn-undo').disabled = historyIdx <= 0;
    document.getElementById('btn-redo').disabled = historyIdx >= history.length - 1;
  }

  window.undo = undo;
  window.redo = redo;

  // ── 프로필 / 로그인 ───────────────────────────────────
  window.selectProfile = function(name) {
    currentUser = name;
    sessionStorage.setItem('notepad-user', name);
    showApp();
  };

  window.logout = function() {
    sessionStorage.removeItem('notepad-user');
    clearInterval(pollTimer);
    currentUser = null;
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  };

  function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    const p = prof(currentUser);
    const pill = document.getElementById('user-pill');
    pill.textContent = `${p.emoji} ${currentUser}`;
    pill.style.background = p.color;
    updateUndoRedoButtons();
    fetchData();
    pollTimer = setInterval(() => { if (!isDirty) fetchData(); }, 10000);
  }

  // ── API ───────────────────────────────────────────────
  async function fetchData() {
    setSyncStatus('syncing', '동기화 중...');
    try {
      const res = await fetch(WORKER_URL + '/api/notes');
      const data = await res.json();
      if (data.version === 2 && Array.isArray(data.elements)) {
        for (const remote of data.elements) {
          const local = elements.find(e => e.id === remote.id);
          if (!local) {
            elements.push(remote);
          } else if (remote.updatedAt > local.updatedAt && remote.id !== editingId) {
            Object.assign(local, remote);
          }
        }
        elements = elements.filter(e =>
          e.id === editingId || data.elements.find(r => r.id === e.id)
        );
        renderElements();
        if (history.length === 0) snapshot();
      }
      setSyncStatus('synced', '동기화됨');
    } catch {
      setSyncStatus('error', '연결 오류');
    }
  }

  async function pushData() {
    setSyncStatus('syncing', '저장 중...');
    try {
      await fetch(WORKER_URL + '/api/notes', {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ version: 2, elements }),
      });
      isDirty = false;
      setSyncStatus('synced', '저장됨 ✓');
    } catch {
      setSyncStatus('error', '저장 실패');
    }
  }

  function scheduleSave() {
    isDirty = true;
    clearTimeout(saveTimer);
    saveTimer = setTimeout(pushData, 1500);
  }

  function setSyncStatus(state, text) {
    document.getElementById('sync-pill').className = 'sync-pill ' + state;
    document.getElementById('sync-text').textContent = text;
  }

  // ── 좌표 변환 ─────────────────────────────────────────
  function screenToCanvas(sx, sy) {
    const r = viewportEl.getBoundingClientRect();
    return {
      x: (sx - r.left - vp.x) / vp.zoom,
      y: (sy - r.top  - vp.y) / vp.zoom,
    };
  }

  // 뷰포트 내 상대 좌표 → 캔버스 좌표
  function vpRelToCanvas(rx, ry) {
    return { x: (rx - vp.x) / vp.zoom, y: (ry - vp.y) / vp.zoom };
  }

  function updateTransform() {
    canvasEl.style.transform = `translate(${vp.x}px,${vp.y}px) scale(${vp.zoom})`;
  }

  // ── 선택 ─────────────────────────────────────────────
  function selectEl(id, shift = false) {
    if (!id) {
      selected.clear();
    } else if (shift) {
      if (selected.has(id)) selected.delete(id);
      else selected.add(id);
    } else {
      if (!selected.has(id)) { selected.clear(); selected.add(id); }
    }
    updateSelectionVisuals();
  }

  function updateSelectionVisuals() {
    for (const [nid, node] of nodeMap) {
      node.classList.toggle('selected', selected.has(nid));
    }
  }

  // ── 요소 생성 ─────────────────────────────────────────
  function newId() { return 'el_' + Date.now() + '_' + Math.random().toString(36).slice(2,6); }

  function addSticky(canvasX, canvasY) {
    let x, y;
    if (canvasX !== undefined) {
      x = canvasX - 110; y = canvasY - 80;
    } else {
      const r = viewportEl.getBoundingClientRect();
      x = (r.width / 2 - vp.x) / vp.zoom - 110;
      y = (r.height / 2 - vp.y) / vp.zoom - 80;
    }
    const el = {
      id: newId(), type: 'sticky',
      x, y, w: 220, h: 160,
      content: '', author: currentUser, important: false,
      createdAt: Date.now(), updatedAt: Date.now(),
    };
    elements.push(el);
    snapshot();
    renderElements();
    selected.clear(); selected.add(el.id); updateSelectionVisuals();
    setTimeout(() => startEditing(el.id), 30);
    scheduleSave();
  }
  window.addSticky = addSticky;

  function addImage(src) {
    const img = new Image();
    img.onload = () => {
      const MAX = 400;
      const r = Math.min(MAX / img.width, MAX / img.height, 1);
      const w = Math.round(img.width * r);
      const h = Math.round(img.height * r);
      const rect = viewportEl.getBoundingClientRect();
      const cx = (rect.width / 2 - vp.x) / vp.zoom;
      const cy = (rect.height / 2 - vp.y) / vp.zoom;
      const el = {
        id: newId(), type: 'image',
        x: cx - w / 2, y: cy - h / 2,
        w, h, src, author: currentUser, important: false,
        createdAt: Date.now(), updatedAt: Date.now(),
      };
      elements.push(el);
      snapshot();
      renderElements();
      selected.clear(); selected.add(el.id); updateSelectionVisuals();
      scheduleSave();
    };
    img.src = src;
  }

  function deleteSelected() {
    if (selected.size === 0) return;
    stopEditing();
    elements = elements.filter(e => !selected.has(e.id));
    for (const id of selected) {
      const node = nodeMap.get(id);
      if (node) { canvasEl.removeChild(node); nodeMap.delete(id); }
    }
    selected.clear();
    snapshot();
    scheduleSave();
  }

  function toggleImportant(id) {
    const el = elements.find(e => e.id === id);
    if (!el) return;
    el.important = !el.important;
    el.updatedAt = Date.now();
    syncStyle(el);
    snapshot();
    scheduleSave();
  }

  // ── 편집 ─────────────────────────────────────────────
  function startEditing(id) {
    editingId = id;
    const node = nodeMap.get(id);
    if (!node) return;
    const ta = node.querySelector('.el-text');
    if (ta) { ta.classList.add('editing'); ta.focus(); }
  }

  function stopEditing() {
    if (!editingId) return;
    const node = nodeMap.get(editingId);
    if (node) { const ta = node.querySelector('.el-text'); if (ta) ta.classList.remove('editing'); }
    editingId = null;
  }

  // ── 렌더 ─────────────────────────────────────────────
  function renderElements() {
    for (const [id, node] of nodeMap) {
      if (!elements.find(e => e.id === id)) { canvasEl.removeChild(node); nodeMap.delete(id); }
    }
    for (const el of elements) {
      if (!nodeMap.has(el.id)) { const node = buildNode(el); canvasEl.appendChild(node); nodeMap.set(el.id, node); }
      syncStyle(el);
    }
  }

  function buildNode(el) {
    const p = prof(el.author);
    const isPrincess = !!p.princess;
    const div = document.createElement('div');
    div.className = `el el-${el.type}` + (isPrincess ? ' el-princess' : '');
    div.dataset.id = el.id;

    const header = document.createElement('div');
    header.className = 'el-header' + (isPrincess ? ' princess-header' : '');
    if (!isPrincess) header.style.background = p.color;

    const authorLabel = document.createElement('span');
    authorLabel.className = 'el-author-label';
    authorLabel.textContent = `${p.emoji} ${el.author}`;
    header.appendChild(authorLabel);

    if (isPrincess) {
      const ribbon = document.createElement('span');
      ribbon.className = 'princess-ribbon';
      ribbon.textContent = '🎀';
      div.appendChild(ribbon);
    }

    const starBtn = document.createElement('button');
    starBtn.className = 'star-btn' + (el.important ? ' starred' : '');
    starBtn.title = '중요 표시';
    starBtn.textContent = '★';
    starBtn.addEventListener('mousedown', e => e.stopPropagation());
    starBtn.addEventListener('click', e => { e.stopPropagation(); toggleImportant(el.id); });
    header.appendChild(starBtn);

    div.appendChild(header);

    if (el.type === 'sticky') {
      const body = document.createElement('div');
      body.className = 'el-body' + (isPrincess ? ' princess-body' : '');
      if (!isPrincess) body.style.background = p.light;
      const ta = document.createElement('textarea');
      ta.className = 'el-text';
      ta.placeholder = '메모를 입력하세요...';
      ta.value = el.content || '';
      let textSnapshotTimer = null;
      ta.addEventListener('input', () => {
        el.content = ta.value; el.updatedAt = Date.now(); scheduleSave();
        clearTimeout(textSnapshotTimer);
        textSnapshotTimer = setTimeout(snapshot, 1000);
      });
      ta.addEventListener('mousedown', e => { if (editingId === el.id) e.stopPropagation(); });
      body.appendChild(ta);
      div.appendChild(body);
    } else if (el.type === 'image') {
      const body = document.createElement('div');
      body.className = 'el-img-body';
      const img = document.createElement('img');
      img.src = el.src; img.alt = '이미지'; img.draggable = false;
      body.appendChild(img);
      div.appendChild(body);
    }

    const footer = document.createElement('div');
    footer.className = 'el-footer' + (isPrincess ? ' princess-footer' : '');
    footer.textContent = formatDate(el.updatedAt);
    div.appendChild(footer);

    const badge = document.createElement('div');
    badge.className = 'important-badge';
    badge.textContent = '★';
    div.appendChild(badge);

    const handle = document.createElement('div');
    handle.className = 'resize-handle';
    handle.dataset.resize = 'true';
    div.appendChild(handle);

    return div;
  }

  function syncStyle(el) {
    const node = nodeMap.get(el.id);
    if (!node) return;
    const p = prof(el.author);
    node.style.left = el.x + 'px'; node.style.top = el.y + 'px';
    node.style.width = el.w + 'px'; node.style.height = el.h + 'px';
    node.classList.toggle('selected', selected.has(el.id));
    node.classList.toggle('important-flag', !!el.important);
    const isPrincess = !!p.princess;
    const header = node.querySelector('.el-header');
    if (header && !isPrincess) header.style.background = p.color;
    const body = node.querySelector('.el-body');
    if (body && !isPrincess) body.style.background = p.light;
    const starBtn = node.querySelector('.star-btn');
    if (starBtn) starBtn.className = 'star-btn' + (el.important ? ' starred' : '');
    if (el.type === 'sticky' && editingId !== el.id) {
      const ta = node.querySelector('.el-text');
      if (ta && ta.value !== (el.content || '')) ta.value = el.content || '';
    }
    const footer = node.querySelector('.el-footer');
    if (footer) {
      footer.textContent = formatDate(el.updatedAt);
      if (!isPrincess) footer.style.background = p.light;
    }
  }

  // ── 마우스 이벤트 ─────────────────────────────────────
  viewportEl.addEventListener('mousedown', e => {
    if (e.button !== 0) return;

    // 편집 중 처리
    if (editingId) {
      const node = nodeMap.get(editingId);
      if (node?.contains(e.target)) return;
      stopEditing();
    }

    const r = viewportEl.getBoundingClientRect();

    // Space + 드래그 → 팬
    if (spaceDown) {
      viewportEl.classList.add('panning');
      action = { type: 'pan', sx: e.clientX, sy: e.clientY, vx: vp.x, vy: vp.y };
      e.preventDefault();
      return;
    }

    // 리사이즈 핸들
    if (e.target.dataset.resize) {
      const elDiv = e.target.closest('.el');
      const id = elDiv?.dataset.id;
      const el = elements.find(x => x.id === id);
      if (!el) return;
      if (!selected.has(id)) { selected.clear(); selected.add(id); updateSelectionVisuals(); }
      action = { type: 'resize', id, sx: e.clientX, sy: e.clientY, sw: el.w, sh: el.h };
      e.preventDefault();
      return;
    }

    // 요소 클릭 → 이동 준비
    const elDiv = e.target.closest('.el');
    if (elDiv) {
      const id = elDiv.dataset.id;
      const el = elements.find(x => x.id === id);
      if (!el) return;
      selectEl(id, e.shiftKey);
      // 선택된 모든 요소의 시작 위치 기록
      const startPositions = [...selected].map(sid => {
        const sel = elements.find(x => x.id === sid);
        return sel ? { id: sid, x: sel.x, y: sel.y } : null;
      }).filter(Boolean);
      action = { type: 'move', sx: e.clientX, sy: e.clientY, startPositions, moved: false };
      e.preventDefault();
      return;
    }

    // 빈 캔버스 → 범위 선택(마퀴)
    if (!e.shiftKey) selected.clear();
    const mx = e.clientX - r.left;
    const my = e.clientY - r.top;
    action = { type: 'marquee', sx: mx, sy: my, cx: mx, cy: my };
    selBox.style.display = 'block';
    selBox.style.left = mx + 'px'; selBox.style.top = my + 'px';
    selBox.style.width = '0'; selBox.style.height = '0';
    updateSelectionVisuals();
  });

  document.addEventListener('mousemove', e => {
    if (!action) return;
    const dx = e.clientX - action.sx;
    const dy = e.clientY - action.sy;
    const r = viewportEl.getBoundingClientRect();

    if (action.type === 'pan') {
      vp.x = action.vx + dx; vp.y = action.vy + dy;
      updateTransform();

    } else if (action.type === 'move') {
      if (Math.abs(dx) > 3 || Math.abs(dy) > 3) action.moved = true;
      for (const sp of action.startPositions) {
        const el = elements.find(x => x.id === sp.id);
        if (!el) continue;
        el.x = sp.x + dx / vp.zoom;
        el.y = sp.y + dy / vp.zoom;
        syncStyle(el);
      }
      scheduleSave();

    } else if (action.type === 'resize') {
      const el = elements.find(x => x.id === action.id);
      if (!el) return;
      el.w = Math.max(100, action.sw + dx / vp.zoom);
      el.h = Math.max(60,  action.sh + dy / vp.zoom);
      syncStyle(el);
      scheduleSave();

    } else if (action.type === 'marquee') {
      const cx = e.clientX - r.left;
      const cy = e.clientY - r.top;
      action.cx = cx; action.cy = cy;
      const x1 = Math.min(action.sx, cx), y1 = Math.min(action.sy, cy);
      const x2 = Math.max(action.sx, cx), y2 = Math.max(action.sy, cy);
      selBox.style.left = x1 + 'px'; selBox.style.top = y1 + 'px';
      selBox.style.width = (x2 - x1) + 'px'; selBox.style.height = (y2 - y1) + 'px';

      // 마퀴와 겹치는 요소 선택
      const c1 = vpRelToCanvas(x1, y1);
      const c2 = vpRelToCanvas(x2, y2);
      for (const el of elements) {
        const hit = c1.x < el.x + el.w && c2.x > el.x && c1.y < el.y + el.h && c2.y > el.y;
        if (hit) selected.add(el.id); else selected.delete(el.id);
      }
      updateSelectionVisuals();
    }
  });

  document.addEventListener('mouseup', e => {
    if (action?.type === 'pan') viewportEl.classList.remove('panning');
    if (action?.type === 'move' && action.moved) snapshot();
    if (action?.type === 'resize') snapshot();
    if (action?.type === 'marquee') { selBox.style.display = 'none'; }
    action = null;
  });

  // 더블클릭: 스티커 편집 or 생성
  viewportEl.addEventListener('dblclick', e => {
    if (spaceDown) return;
    const sticky = e.target.closest('.el-sticky');
    if (sticky) { startEditing(sticky.dataset.id); return; }
    if (e.target.closest('.el')) return;
    const pos = screenToCanvas(e.clientX, e.clientY);
    addSticky(pos.x, pos.y);
  });

  // 줌
  viewportEl.addEventListener('wheel', e => {
    e.preventDefault();
    const factor = e.deltaY > 0 ? 0.92 : 1.08;
    const newZoom = Math.max(0.15, Math.min(5, vp.zoom * factor));
    const r = viewportEl.getBoundingClientRect();
    const mx = e.clientX - r.left, my = e.clientY - r.top;
    vp.x = mx - (mx - vp.x) * (newZoom / vp.zoom);
    vp.y = my - (my - vp.y) * (newZoom / vp.zoom);
    vp.zoom = newZoom;
    updateTransform();
  }, { passive: false });

  // Space 키 추적
  document.addEventListener('keydown', e => {
    if (e.key === ' ' && !editingId) { e.preventDefault(); spaceDown = true; viewportEl.classList.add('space-mode'); }

    // Ctrl+Z
    if (e.key === 'z' && (e.ctrlKey || e.metaKey) && !e.shiftKey) { e.preventDefault(); undo(); return; }
    // Ctrl+Shift+Z / Ctrl+Y
    if ((e.key === 'z' && (e.ctrlKey || e.metaKey) && e.shiftKey) ||
        (e.key === 'y' && (e.ctrlKey || e.metaKey))) { e.preventDefault(); redo(); return; }

    if (editingId) return;
    if ((e.key === 'Delete' || e.key === 'Backspace') && selected.size > 0) {
      e.preventDefault(); deleteSelected();
    }
    if (e.key === '0' && (e.ctrlKey || e.metaKey)) {
      e.preventDefault(); vp = { x: 0, y: 0, zoom: 1 }; updateTransform();
    }
    // Ctrl+A: 전체 선택
    if (e.key === 'a' && (e.ctrlKey || e.metaKey) && !editingId) {
      e.preventDefault();
      elements.forEach(el => selected.add(el.id));
      updateSelectionVisuals();
    }
  });

  document.addEventListener('keyup', e => {
    if (e.key === ' ') { spaceDown = false; viewportEl.classList.remove('space-mode'); viewportEl.classList.remove('panning'); }
  });

  // 클립보드 이미지
  document.addEventListener('paste', async e => {
    if (editingId) return;
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        addImage(await fileToBase64(item.getAsFile()));
        return;
      }
    }
  });

  // 파일 선택
  document.getElementById('file-input').addEventListener('change', async e => {
    const file = e.target.files?.[0];
    if (!file) return;
    addImage(await fileToBase64(file));
    e.target.value = '';
  });

  // ── 날짜 포맷 ─────────────────────────────────────────
  const DAYS = ['일','월','화','수','목','금','토'];
  function formatDate(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    const yy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    const day = DAYS[d.getDay()];
    const hh = String(d.getHours()).padStart(2, '0');
    const mi = String(d.getMinutes()).padStart(2, '0');
    return `${yy}.${mm}.${dd} (${day}) ${hh}:${mi}`;
  }

  function fileToBase64(file) {
    return new Promise(resolve => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        const MAX = 1200;
        let w = img.width, h = img.height;
        if (w > MAX || h > MAX) { const r = Math.min(MAX/w, MAX/h); w = Math.round(w*r); h = Math.round(h*r); }
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        c.getContext('2d').drawImage(img, 0, 0, w, h);
        URL.revokeObjectURL(url);
        resolve(c.toDataURL('image/jpeg', 0.85));
      };
      img.src = url;
    });
  }

  // ── 초기화 ───────────────────────────────────────────
  updateTransform();
  updateUndoRedoButtons();
  const savedUser = sessionStorage.getItem('notepad-user');
  if (savedUser) { currentUser = savedUser; showApp(); }
</script>
</body>
</html>
