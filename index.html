<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>어울림스튜디오 메모장</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; background: #f0f2f5; min-height: 100vh; }

    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #141414;
    }
    .profile-screen-title { color: white; font-size: 34px; font-weight: 400; margin-bottom: 48px; }
    .profile-list { display: flex; gap: 32px; flex-wrap: wrap; justify-content: center; }
    .profile-card { display: flex; flex-direction: column; align-items: center; gap: 14px; cursor: pointer; }
    .profile-avatar {
      width: 120px; height: 120px; border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 52px; border: 3px solid transparent;
      transition: border-color 0.15s, transform 0.15s; user-select: none;
    }
    .profile-card:hover .profile-avatar { border-color: white; transform: scale(1.05); }
    .profile-name { color: #aaa; font-size: 15px; font-weight: 500; transition: color 0.15s; }
    .profile-card:hover .profile-name { color: white; }

    #app { display: none; }

    header {
      background: white; border-bottom: 1px solid #e8e8e8;
      padding: 0 24px; height: 60px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-logo { font-size: 24px; }
    header h1 { font-size: 17px; color: #1a1a2e; font-weight: 700; }
    .sync-indicator { display: flex; align-items: center; gap: 6px; font-size: 12px; padding: 4px 10px; border-radius: 20px; transition: all 0.3s; }
    .sync-indicator.synced { color: #27ae60; background: #eafaf1; }
    .sync-indicator.syncing { color: #e67e22; background: #fff9f0; }
    .sync-indicator.error { color: #e74c3c; background: #fff0f0; }
    .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
    .sync-indicator.synced .sync-dot { animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .header-right { display: flex; align-items: center; gap: 12px; }
    .user-badge { background: #f0f2f5; padding: 6px 14px; border-radius: 20px; font-size: 13px; color: #555; font-weight: 500; }
    .logout-btn { background: none; border: 1px solid #ddd; padding: 6px 14px; border-radius: 8px; font-size: 13px; color: #888; cursor: pointer; }
    .logout-btn:hover { border-color: #999; color: #555; }

    .layout { display: flex; height: calc(100vh - 60px); }

    .sidebar { width: 260px; background: white; border-right: 1px solid #e8e8e8; display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar-header { padding: 16px; border-bottom: 1px solid #f0f0f0; display: flex; align-items: center; justify-content: space-between; }
    .sidebar-title { font-size: 13px; font-weight: 600; color: #888; text-transform: uppercase; letter-spacing: 0.5px; }
    .add-note-btn {
      width: 28px; height: 28px; background: linear-gradient(135deg, #667eea, #764ba2);
      color: white; border: none; border-radius: 8px; font-size: 18px;
      cursor: pointer; display: flex; align-items: center; justify-content: center; line-height: 1;
    }
    .add-note-btn:hover { opacity: 0.85; }
    .notes-list { flex: 1; overflow-y: auto; padding: 8px; }
    .note-item { padding: 12px 14px; border-radius: 10px; cursor: pointer; transition: background 0.15s; margin-bottom: 2px; border: 2px solid transparent; }
    .note-item:hover { background: #f7f8fa; }
    .note-item.active { background: #f0f0ff; border-color: #667eea22; }
    .note-item-title { font-size: 14px; font-weight: 600; color: #2c2c2c; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 4px; }
    .note-item-preview { font-size: 12px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .note-item-meta { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
    .note-item-time { font-size: 11px; color: #ccc; }
    .note-item-author { font-size: 11px; color: #9b59b6; background: #f5eeff; padding: 2px 8px; border-radius: 10px; }

    .editor-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .editor-toolbar { padding: 12px 24px; background: white; border-bottom: 1px solid #e8e8e8; display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    #note-title-input { font-size: 20px; font-weight: 700; color: #1a1a2e; border: none; outline: none; flex: 1; background: transparent; }
    #note-title-input::placeholder { color: #ccc; }
    .editor-actions { display: flex; align-items: center; gap: 8px; }
    .save-status { font-size: 12px; color: #aaa; }
    .delete-btn { padding: 6px 14px; background: none; border: 1px solid #ffc0c0; color: #e74c3c; border-radius: 8px; font-size: 13px; cursor: pointer; }
    .delete-btn:hover { background: #fff0f0; }
    #note-content { flex: 1; padding: 24px; font-size: 15px; line-height: 1.8; color: #2c2c2c; border: none; outline: none; resize: none; background: #fafafa; font-family: inherit; }
    #note-content::placeholder { color: #ddd; }
    .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #ccc; gap: 12px; }
    .empty-state .icon { font-size: 64px; }
    .empty-state p { font-size: 15px; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
  </style>
</head>
<body>

<div id="login-screen">
  <div class="profile-screen-title">누가 볼 건가요?</div>
  <div class="profile-list">
    <div class="profile-card" onclick="selectProfile('신효범')">
      <div class="profile-avatar" style="background:#5b6ee8;">🐻</div>
      <div class="profile-name">신효범</div>
    </div>
    <div class="profile-card" onclick="selectProfile('밀양장석현')">
      <div class="profile-avatar" style="background:#e8845b;">🦊</div>
      <div class="profile-name">밀양장석현</div>
    </div>
    <div class="profile-card" onclick="selectProfile('에겐현진')">
      <div class="profile-avatar" style="background:#5be8a0;">🐱</div>
      <div class="profile-name">에겐현진</div>
    </div>
  </div>
</div>

<div id="app">
  <header>
    <div class="header-left">
      <span class="header-logo">📝</span>
      <h1>어울림스튜디오 메모장</h1>
      <div class="sync-indicator synced" id="sync-indicator">
        <div class="sync-dot"></div>
        <span id="sync-text">동기화됨</span>
      </div>
    </div>
    <div class="header-right">
      <span class="user-badge" id="user-name-display"></span>
      <button class="logout-btn" onclick="logout()">로그아웃</button>
    </div>
  </header>

  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">메모</span>
        <button class="add-note-btn" onclick="createNote()">+</button>
      </div>
      <div class="notes-list" id="notes-list"></div>
    </div>
    <div class="editor-area">
      <div class="empty-state" id="empty-state">
        <div class="icon">📄</div>
        <p>왼쪽에서 메모를 선택하거나 새로 만드세요</p>
      </div>
      <div id="editor" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
        <div class="editor-toolbar">
          <input type="text" id="note-title-input" placeholder="제목을 입력하세요" />
          <div class="editor-actions">
            <span class="save-status" id="save-status"></span>
            <button class="delete-btn" onclick="deleteNote()">삭제</button>
          </div>
        </div>
        <textarea id="note-content" placeholder="여기에 메모를 작성하세요...&#10;&#10;저장하면 팀원들과 공유됩니다 ✨"></textarea>
      </div>
    </div>
  </div>
</div>

<script>
  // ⚠️ 배포 후 실제 Worker URL로 교체하세요
  const WORKER_URL = "https://eoulrimstudio-note.eoulrimstudio.workers.dev";

  let currentUser = null;
  let notes = {};
  let currentNoteId = null;
  let saveTimer = null;
  let pollTimer = null;
  let isDirty = false;

  async function apiFetch(method, body) {
    const opts = { method, headers: { "Content-Type": "application/json" } };
    if (body !== undefined) opts.body = JSON.stringify(body);
    const res = await fetch(WORKER_URL + "/api/notes", opts);
    if (!res.ok) throw new Error("HTTP " + res.status);
    return res.json();
  }

  window.selectProfile = function (name) {
    currentUser = name;
    sessionStorage.setItem("notepad-user", name);
    showApp();
  };

  window.logout = function () {
    sessionStorage.removeItem("notepad-user");
    clearInterval(pollTimer);
    currentUser = null;
    currentNoteId = null;
    isDirty = false;
    document.getElementById("app").style.display = "none";
    document.getElementById("login-screen").style.display = "flex";
  };

  function showApp() {
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("app").style.display = "block";
    document.getElementById("user-name-display").textContent = currentUser;
    fetchNotes();
    pollTimer = setInterval(() => { if (!isDirty) fetchNotes(); }, 10000);
  }

  async function fetchNotes() {
    setSyncStatus("syncing", "동기화 중...");
    try {
      const data = await apiFetch("GET");
      notes = data;
      renderNotesList();
      if (currentNoteId && notes[currentNoteId] && !isDirty) {
        document.getElementById("note-title-input").value = notes[currentNoteId].title || "";
        document.getElementById("note-content").value = notes[currentNoteId].content || "";
      }
      setSyncStatus("synced", "동기화됨");
    } catch {
      setSyncStatus("error", "연결 오류");
    }
  }

  async function pushNotes() {
    await apiFetch("PUT", notes);
  }

  function setSyncStatus(state, text) {
    document.getElementById("sync-indicator").className = "sync-indicator " + state;
    document.getElementById("sync-text").textContent = text;
  }

  function renderNotesList() {
    const list = document.getElementById("notes-list");
    const sorted = Object.entries(notes).sort(([, a], [, b]) => (b.updatedAt || 0) - (a.updatedAt || 0));
    if (!sorted.length) {
      list.innerHTML = '<div style="padding:20px;text-align:center;color:#ccc;font-size:13px;">메모가 없습니다<br>+ 버튼으로 추가하세요</div>';
      return;
    }
    list.innerHTML = sorted.map(([id, note]) => `
      <div class="note-item ${id === currentNoteId ? "active" : ""}" onclick="selectNote('${id}')">
        <div class="note-item-title">${esc(note.title || "제목 없음")}</div>
        <div class="note-item-preview">${esc((note.content || "").slice(0, 40) || "내용 없음")}</div>
        <div class="note-item-meta">
          <span class="note-item-time">${formatTime(note.updatedAt)}</span>
          <span class="note-item-author">${esc(note.author || "")}</span>
        </div>
      </div>
    `).join("");
  }

  window.selectNote = function (id) {
    currentNoteId = id;
    isDirty = false;
    renderNotesList();
    document.getElementById("empty-state").style.display = "none";
    document.getElementById("editor").style.display = "flex";
    document.getElementById("note-title-input").value = notes[id].title || "";
    document.getElementById("note-content").value = notes[id].content || "";
    document.getElementById("save-status").textContent = "";
  };

  window.createNote = async function () {
    const id = "note_" + Date.now();
    notes[id] = { id, title: "새 메모", content: "", author: currentUser, updatedAt: Date.now(), createdAt: Date.now() };
    renderNotesList();
    selectNote(id);
    setSyncStatus("syncing", "저장 중...");
    try { await pushNotes(); setSyncStatus("synced", "동기화됨"); } catch { setSyncStatus("error", "저장 실패"); }
    setTimeout(() => { const t = document.getElementById("note-title-input"); t.focus(); t.select(); }, 50);
  };

  window.deleteNote = async function () {
    if (!currentNoteId || !confirm("이 메모를 삭제할까요?")) return;
    delete notes[currentNoteId];
    currentNoteId = null;
    isDirty = false;
    renderNotesList();
    document.getElementById("editor").style.display = "none";
    document.getElementById("empty-state").style.display = "flex";
    setSyncStatus("syncing", "저장 중...");
    try { await pushNotes(); setSyncStatus("synced", "동기화됨"); } catch { setSyncStatus("error", "저장 실패"); }
  };

  async function saveNote() {
    if (!currentNoteId) return;
    notes[currentNoteId] = {
      ...notes[currentNoteId],
      title: document.getElementById("note-title-input").value,
      content: document.getElementById("note-content").value,
      author: currentUser,
      updatedAt: Date.now(),
    };
    document.getElementById("save-status").textContent = "저장 중...";
    try {
      await pushNotes();
      isDirty = false;
      document.getElementById("save-status").textContent = "저장됨 ✓";
      renderNotesList();
    } catch {
      document.getElementById("save-status").textContent = "저장 실패";
    }
  }

  function scheduleSave() {
    isDirty = true;
    document.getElementById("save-status").textContent = "입력 중...";
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveNote, 1500);
  }

  document.getElementById("note-title-input").addEventListener("input", scheduleSave);
  document.getElementById("note-content").addEventListener("input", scheduleSave);

  function formatTime(ts) {
    if (!ts) return "";
    const d = new Date(ts), now = new Date();
    if (d.toDateString() === now.toDateString())
      return d.toLocaleTimeString("ko-KR", { hour: "2-digit", minute: "2-digit" });
    return d.toLocaleDateString("ko-KR", { month: "short", day: "numeric" });
  }

  function esc(str) {
    return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
  }

  const savedUser = sessionStorage.getItem("notepad-user");
  if (savedUser) { currentUser = savedUser; showApp(); }
</script>
</body>
</html>
