<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>어울림스튜디오 메모장</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
    }

    /* 로그인 화면 */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }

    .login-card {
      background: white;
      border-radius: 16px;
      padding: 48px 40px;
      width: 360px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.2);
      text-align: center;
    }

    .login-card .logo {
      font-size: 48px;
      margin-bottom: 16px;
    }

    .login-card h1 {
      font-size: 22px;
      color: #1a1a2e;
      margin-bottom: 6px;
    }

    .login-card p {
      color: #888;
      font-size: 14px;
      margin-bottom: 32px;
    }

    .login-card input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e8e8e8;
      border-radius: 10px;
      font-size: 15px;
      margin-bottom: 12px;
      transition: border-color 0.2s;
      outline: none;
    }

    .login-card input:focus { border-color: #667eea; }

    .login-card button {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .login-card button:hover { opacity: 0.9; }

    .login-error {
      color: #e74c3c;
      font-size: 13px;
      margin-top: 10px;
      display: none;
    }

    /* 메인 앱 */
    #app { display: none; }

    header {
      background: white;
      border-bottom: 1px solid #e8e8e8;
      padding: 0 24px;
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-logo { font-size: 24px; }

    header h1 {
      font-size: 17px;
      color: #1a1a2e;
      font-weight: 700;
    }

    .online-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #27ae60;
      background: #eafaf1;
      padding: 4px 10px;
      border-radius: 20px;
    }

    .online-dot {
      width: 7px;
      height: 7px;
      background: #27ae60;
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-badge {
      background: #f0f2f5;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      color: #555;
      font-weight: 500;
    }

    .logout-btn {
      background: none;
      border: 1px solid #ddd;
      padding: 6px 14px;
      border-radius: 8px;
      font-size: 13px;
      color: #888;
      cursor: pointer;
      transition: all 0.2s;
    }

    .logout-btn:hover { border-color: #999; color: #555; }

    /* 레이아웃 */
    .layout {
      display: flex;
      height: calc(100vh - 60px);
    }

    /* 사이드바 */
    .sidebar {
      width: 260px;
      background: white;
      border-right: 1px solid #e8e8e8;
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .sidebar-header {
      padding: 16px;
      border-bottom: 1px solid #f0f0f0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sidebar-title {
      font-size: 13px;
      font-weight: 600;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .add-note-btn {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.2s;
      line-height: 1;
    }

    .add-note-btn:hover { opacity: 0.85; }

    .notes-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px;
    }

    .note-item {
      padding: 12px 14px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s;
      margin-bottom: 2px;
      border: 2px solid transparent;
    }

    .note-item:hover { background: #f7f8fa; }
    .note-item.active { background: #f0f0ff; border-color: #667eea22; }

    .note-item-title {
      font-size: 14px;
      font-weight: 600;
      color: #2c2c2c;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .note-item-preview {
      font-size: 12px;
      color: #aaa;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .note-item-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 6px;
    }

    .note-item-time {
      font-size: 11px;
      color: #ccc;
    }

    .note-item-author {
      font-size: 11px;
      color: #9b59b6;
      background: #f5eeff;
      padding: 2px 8px;
      border-radius: 10px;
    }

    /* 메인 에디터 */
    .editor-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .editor-toolbar {
      padding: 12px 24px;
      background: white;
      border-bottom: 1px solid #e8e8e8;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    #note-title-input {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a2e;
      border: none;
      outline: none;
      flex: 1;
      background: transparent;
    }

    #note-title-input::placeholder { color: #ccc; }

    .editor-actions {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .save-status {
      font-size: 12px;
      color: #aaa;
    }

    .delete-btn {
      padding: 6px 14px;
      background: none;
      border: 1px solid #ffc0c0;
      color: #e74c3c;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .delete-btn:hover { background: #fff0f0; }

    #note-content {
      flex: 1;
      padding: 24px;
      font-size: 15px;
      line-height: 1.8;
      color: #2c2c2c;
      border: none;
      outline: none;
      resize: none;
      background: #fafafa;
      font-family: inherit;
    }

    #note-content::placeholder { color: #ddd; }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #ccc;
      gap: 12px;
    }

    .empty-state .icon { font-size: 64px; }
    .empty-state p { font-size: 15px; }

    /* 실시간 편집 중 표시 */
    .editing-badge {
      font-size: 12px;
      color: #e67e22;
      background: #fff9f0;
      padding: 3px 10px;
      border-radius: 10px;
      border: 1px solid #ffe0b0;
    }

    /* 스크롤바 */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }

    /* 반응형 */
    @media (max-width: 600px) {
      .sidebar { width: 200px; }
    }
  </style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="login-screen">
  <div class="login-card">
    <div class="logo">📝</div>
    <h1>어울림스튜디오 메모장</h1>
    <p>팀 공유 메모 공간입니다</p>
    <input type="text" id="login-name" placeholder="이름 (예: 홍길동)" maxlength="10" />
    <input type="password" id="login-password" placeholder="팀 비밀번호" />
    <button onclick="login()">입장하기</button>
    <div class="login-error" id="login-error">비밀번호가 틀렸습니다.</div>
  </div>
</div>

<!-- 메인 앱 -->
<div id="app">
  <header>
    <div class="header-left">
      <span class="header-logo">📝</span>
      <h1>어울림스튜디오 메모장</h1>
      <div class="online-indicator">
        <div class="online-dot"></div>
        <span id="online-text">연결 중...</span>
      </div>
    </div>
    <div class="header-right">
      <span class="user-badge" id="user-name-display"></span>
      <button class="logout-btn" onclick="logout()">로그아웃</button>
    </div>
  </header>

  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">메모</span>
        <button class="add-note-btn" onclick="createNote()" title="새 메모">+</button>
      </div>
      <div class="notes-list" id="notes-list"></div>
    </div>

    <div class="editor-area" id="editor-area">
      <div class="empty-state" id="empty-state">
        <div class="icon">📄</div>
        <p>왼쪽에서 메모를 선택하거나 새로 만드세요</p>
      </div>

      <div id="editor" style="display:none; flex-direction:column; flex:1; overflow:hidden;">
        <div class="editor-toolbar">
          <input type="text" id="note-title-input" placeholder="제목을 입력하세요" />
          <div class="editor-actions">
            <span class="editing-badge" id="editing-badge" style="display:none"></span>
            <span class="save-status" id="save-status">저장됨</span>
            <button class="delete-btn" onclick="deleteNote()">삭제</button>
          </div>
        </div>
        <textarea id="note-content" placeholder="여기에 메모를 작성하세요...&#10;&#10;팀원들과 실시간으로 공유됩니다 ✨"></textarea>
      </div>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, set, onValue, push, remove, serverTimestamp, onDisconnect }
    from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // ⚠️ Firebase 설정 - 아래 값을 본인의 Firebase 프로젝트 설정으로 교체하세요
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
    projectId: "YOUR_PROJECT_ID",
    storageBucket: "YOUR_PROJECT.appspot.com",
    messagingSenderId: "YOUR_SENDER_ID",
    appId: "YOUR_APP_ID"
  };

  // 팀 비밀번호 (원하는 값으로 변경하세요)
  const TEAM_PASSWORD = "eoulrim2024";

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  let currentUser = null;
  let currentNoteId = null;
  let notes = {};
  let saveTimer = null;
  let isRemoteUpdate = false;

  // ─── 로그인 ───
  window.login = function() {
    const name = document.getElementById('login-name').value.trim();
    const pw = document.getElementById('login-password').value;
    const errEl = document.getElementById('login-error');

    if (!name) { errEl.style.display = 'block'; errEl.textContent = '이름을 입력해주세요.'; return; }
    if (pw !== TEAM_PASSWORD) { errEl.style.display = 'block'; errEl.textContent = '비밀번호가 틀렸습니다.'; return; }

    currentUser = name;
    sessionStorage.setItem('notepad-user', name);
    showApp();
  };

  window.logout = function() {
    sessionStorage.removeItem('notepad-user');
    currentUser = null;
    currentNoteId = null;
    document.getElementById('app').style.display = 'none';
    document.getElementById('login-screen').style.display = 'flex';
  };

  function showApp() {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    document.getElementById('user-name-display').textContent = currentUser;
    initNotes();
  }

  // ─── 자동 로그인 복원 ───
  const savedUser = sessionStorage.getItem('notepad-user');
  if (savedUser) { currentUser = savedUser; showApp(); }

  // ─── 엔터키로 로그인 ───
  document.getElementById('login-password').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.login();
  });

  // ─── Firebase 초기화 ───
  function initNotes() {
    const notesRef = ref(db, 'notes');
    onValue(notesRef, snapshot => {
      notes = snapshot.val() || {};
      renderNotesList();

      if (currentNoteId && notes[currentNoteId]) {
        const note = notes[currentNoteId];
        // 다른 사람이 편집 중이면 내용 반영
        if (note.editingBy && note.editingBy !== currentUser) {
          isRemoteUpdate = true;
          document.getElementById('note-title-input').value = note.title || '';
          document.getElementById('note-content').value = note.content || '';
          isRemoteUpdate = false;
          showEditingBadge(note.editingBy);
        } else if (!note.editingBy) {
          isRemoteUpdate = true;
          document.getElementById('note-title-input').value = note.title || '';
          document.getElementById('note-content').value = note.content || '';
          isRemoteUpdate = false;
          document.getElementById('editing-badge').style.display = 'none';
        }
      }
    });

    // 연결 상태
    const connRef = ref(db, '.info/connected');
    onValue(connRef, snap => {
      const onlineText = document.getElementById('online-text');
      if (snap.val()) {
        onlineText.textContent = '실시간 연결됨';
        document.querySelector('.online-indicator').style.color = '#27ae60';
      } else {
        onlineText.textContent = '연결 끊김';
        document.querySelector('.online-indicator').style.color = '#e74c3c';
      }
    });
  }

  // ─── 메모 목록 렌더링 ───
  function renderNotesList() {
    const list = document.getElementById('notes-list');
    const sorted = Object.entries(notes)
      .sort(([,a],[,b]) => (b.updatedAt || 0) - (a.updatedAt || 0));

    if (sorted.length === 0) {
      list.innerHTML = '<div style="padding:20px;text-align:center;color:#ccc;font-size:13px;">메모가 없습니다<br>+ 버튼으로 추가하세요</div>';
      return;
    }

    list.innerHTML = sorted.map(([id, note]) => `
      <div class="note-item ${id === currentNoteId ? 'active' : ''}" onclick="selectNote('${id}')">
        <div class="note-item-title">${escapeHtml(note.title || '제목 없음')}</div>
        <div class="note-item-preview">${escapeHtml((note.content || '').slice(0, 40) || '내용 없음')}</div>
        <div class="note-item-meta">
          <span class="note-item-time">${formatTime(note.updatedAt)}</span>
          <span class="note-item-author">${escapeHtml(note.author || '')}</span>
        </div>
      </div>
    `).join('');
  }

  // ─── 메모 선택 ───
  window.selectNote = function(id) {
    currentNoteId = id;
    const note = notes[id];
    if (!note) return;

    renderNotesList();
    document.getElementById('empty-state').style.display = 'none';
    const editor = document.getElementById('editor');
    editor.style.display = 'flex';

    isRemoteUpdate = true;
    document.getElementById('note-title-input').value = note.title || '';
    document.getElementById('note-content').value = note.content || '';
    isRemoteUpdate = false;

    document.getElementById('save-status').textContent = '저장됨';

    if (note.editingBy && note.editingBy !== currentUser) {
      showEditingBadge(note.editingBy);
    } else {
      document.getElementById('editing-badge').style.display = 'none';
    }
  };

  // ─── 새 메모 ───
  window.createNote = function() {
    const notesRef = ref(db, 'notes');
    const newRef = push(notesRef);
    const newNote = {
      title: '새 메모',
      content: '',
      author: currentUser,
      updatedAt: Date.now(),
      createdAt: Date.now()
    };
    set(newRef, newNote).then(() => {
      selectNote(newRef.key);
      setTimeout(() => {
        const titleInput = document.getElementById('note-title-input');
        titleInput.focus();
        titleInput.select();
      }, 100);
    });
  };

  // ─── 메모 삭제 ───
  window.deleteNote = function() {
    if (!currentNoteId) return;
    if (!confirm('이 메모를 삭제할까요?')) return;

    remove(ref(db, `notes/${currentNoteId}`)).then(() => {
      currentNoteId = null;
      document.getElementById('editor').style.display = 'none';
      document.getElementById('empty-state').style.display = 'flex';
    });
  };

  // ─── 자동 저장 ───
  function scheduleSave() {
    if (isRemoteUpdate) return;
    document.getElementById('save-status').textContent = '저장 중...';
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveNote, 800);
  }

  function saveNote() {
    if (!currentNoteId) return;
    const title = document.getElementById('note-title-input').value;
    const content = document.getElementById('note-content').value;

    set(ref(db, `notes/${currentNoteId}`), {
      ...notes[currentNoteId],
      title,
      content,
      author: currentUser,
      updatedAt: Date.now(),
      editingBy: null
    }).then(() => {
      document.getElementById('save-status').textContent = '저장됨';
    });
  }

  // ─── 편집 중 표시 ───
  function markEditing() {
    if (!currentNoteId || isRemoteUpdate) return;
    set(ref(db, `notes/${currentNoteId}/editingBy`), currentUser);
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveNote, 1200);
  }

  function showEditingBadge(name) {
    const badge = document.getElementById('editing-badge');
    badge.textContent = `${name}님 편집 중`;
    badge.style.display = 'inline';
  }

  // ─── 입력 이벤트 ───
  document.getElementById('note-title-input').addEventListener('input', () => {
    markEditing();
    scheduleSave();
  });

  document.getElementById('note-content').addEventListener('input', () => {
    markEditing();
    scheduleSave();
  });

  // ─── 유틸 ───
  function formatTime(ts) {
    if (!ts) return '';
    const d = new Date(ts);
    const now = new Date();
    if (d.toDateString() === now.toDateString()) {
      return d.toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });
    }
    return d.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' });
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }
</script>
</body>
</html>
